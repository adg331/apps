<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万词斩-内置七下词库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f6fa;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px 40px; }

        .tabs {
            display: flex;
            background: #fff;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            border: none;
            background: none;
        }
        .tab.active {
            color: #5e72e4;
            font-weight: 700;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: #5e72e4;
            border-radius: 3px 3px 0 0;
        }

        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #5e72e4;
            border-radius: 2px;
        }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #636e72;
            margin-bottom: 6px;
        }
        select, textarea, input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 15px;
            background: #fafbfc;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #5e72e4;
            background: #fff;
        }
        textarea { resize: vertical; min-height: 200px; line-height: 1.8; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: #5e72e4;
            color: #fff;
            box-shadow: 0 4px 12px rgba(94,114,228,0.3);
        }
        .btn-primary:active { transform: translateY(1px); }
        .btn-success {
            background: #2dce89;
            color: #fff;
            box-shadow: 0 4px 12px rgba(45,206,137,0.3);
        }
        .btn-danger {
            background: #f5365c;
            color: #fff;
            box-shadow: 0 4px 12px rgba(245,54,92,0.3);
        }
        .btn-secondary {
            background: #8898aa;
            color: #fff;
        }
        .btn-block { width: 100%; margin-top: 12px; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn-group .btn { flex: 1; }

        .quantity-selector {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .quantity-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background: #fafbfc;
        }
        .quantity-option.selected {
            border-color: #5e72e4;
            background: #5e72e4;
            color: #fff;
        }

        .stats { display: flex; gap: 12px; margin-top: 16px; }
        .stat-box {
            flex: 1;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #2dce89;
        }
        .stat-number.fail { color: #f5365c; }
        .stat-label {
            font-size: 12px;
            color: #8898aa;
            margin-top: 4px;
        }

        .fullscreen-study {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f5f6fa;
            z-index: 200;
            flex-direction: column;
            overflow: hidden;
        }
        .fullscreen-study.active { display: flex; }

        .study-header {
            background: #fff;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2;
            position: relative;
        }
        .study-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-close-study {
            background: #f5f6fa;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            color: #636e72;
        }
        .study-progress-text {
            font-size: 14px;
            font-weight: 700;
            color: #5e72e4;
        }
        .study-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #e1e8ed;
        }
        .study-progress-fill {
            height: 100%;
            background: #5e72e4;
            transition: width 0.3s ease;
        }

        .study-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        .word-card {
            text-align: center;
            margin-bottom: 28px;
            animation: slideUp 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .word-main {
            font-size: 36px;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .word-phonetic {
            font-size: 18px;
            color: #8898aa;
            font-family: "Times New Roman", serif;
            margin-bottom: 8px;
        }
        .word-pos {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .word-example {
            margin-top: 16px;
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            max-width: 100%;
            padding: 12px 18px;
            background: #fff;
            border-radius: 12px;
            border-left: 4px solid #5e72e4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: left;
            font-style: italic;
        }
        .word-example:empty { display: none; }

        .btn-replay {
            margin-top: 14px;
            background: #fff;
            border: 2px solid #e1e8ed;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.2s;
            color: #5e72e4;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .btn-replay:hover {
            border-color: #5e72e4;
            background: #f5f7ff;
            transform: scale(1.08);
        }
        .btn-replay:active { transform: scale(0.95); }

        .options-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 20px;
        }
        .option {
            padding: 18px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 16px;
            cursor: pointer;
            font-size: 17px;
            transition: all 0.2s;
            background: #fff;
            text-align: left;
            position: relative;
            overflow: hidden;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .option:hover { border-color: #b0c4de; background: #f8f9ff; transform: translateY(-1px); }
        .option.correct {
            border-color: #2dce89;
            background: #e6f9f0;
            color: #1a7a4e;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(45,206,137,0.15);
        }
        .option.wrong {
            border-color: #f5365c;
            background: #ffe6ea;
            color: #c41e3a;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(245,54,92,0.15);
        }
        .option.disabled { pointer-events: none; }
        .option-marker {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            font-weight: 800;
        }

        .spell-body {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        .spell-body.active { display: flex; }
        .spell-card {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 100%;
        }
        .spell-hint {
            font-size: 18px;
            color: #636e72;
            margin-bottom: 16px;
            line-height: 1.6;
            padding: 12px 18px;
            background: #fff;
            border-radius: 12px;
            border-left: 4px solid #2dce89;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: left;
            width: 100%;
        }
        .spell-hint:empty { display: none; }
        .spell-pos-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .spell-word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 20px 0;
            min-height: 60px;
            align-items: center;
        }
        .spell-char {
            width: 40px;
            height: 52px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            background: #fff;
            transition: all 0.2s;
        }
        .spell-char.filled {
            border-color: #5e72e4;
            color: #5e72e4;
            background: #f5f7ff;
        }
        .spell-char.blank {
            border-color: #cbd5e0;
            border-style: dashed;
            background: #fafbfc;
            color: #8898aa;
        }
        .spell-char.space-char {
            border-color: transparent;
            background: transparent;
            width: 20px;
        }
        .spell-char.correct-reveal {
            border-color: #2dce89;
            color: #2dce89;
            background: #e6f9f0;
            animation: popIn 0.3s ease;
        }
        .spell-char.wrong-reveal {
            border-color: #f5365c;
            color: #f5365c;
            background: #ffe6ea;
            animation: shake 0.4s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .spell-input-area {
            width: 100%;
            max-width: 100%;
            margin-top: 8px;
        }
        .spell-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 14px;
            font-size: 20px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            background: #fff;
            transition: border-color 0.2s;
        }
        .spell-input:focus {
            outline: none;
            border-color: #5e72e4;
        }
        .spell-input.correct {
            border-color: #2dce89;
            background: #e6f9f0;
        }
        .spell-input.wrong {
            border-color: #f5365c;
            background: #ffe6ea;
        }
        .spell-btn-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            width: 100%;
            max-width: 100%;
        }
        .spell-btn-row .btn { flex: 1; }

        .spell-result {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.5s;
            overflow-y: auto;
        }
        .spell-result.active { display: flex; }

        .result-fullscreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.5s;
            overflow-y: auto;
        }
        .result-fullscreen.active { display: flex; }
        .result-emoji { font-size: 72px; margin-bottom: 20px; }
        .result-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: #2d3436; }
        .result-sub { color: #8898aa; margin-bottom: 28px; font-size: 16px; }
        .result-stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            width: 100%;
            max-width: 100%;
        }
        .result-stat {
            flex: 1;
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .result-stat-num {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .result-stat-label { font-size: 12px; color: #8898aa; }
        .result-actions {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 100%;
        }
        .result-actions .btn { flex: 1; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: modalIn 0.3s;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            padding: 20px 20px 0;
            font-size: 18px;
            font-weight: 800;
        }
        .modal-body {
            padding: 16px 20px;
            overflow-y: auto;
            max-height: 50vh;
            font-size: 14px;
            line-height: 1.8;
        }
        .modal-footer {
            padding: 12px 20px 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-footer .btn { padding: 10px 20px; }

        .word-list-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .word-list-item:last-child { border-bottom: none; }
        .word-list-term {
            font-weight: 700;
            color: #2d3436;
            font-size: 15px;
        }
        .word-list-meta {
            color: #8898aa;
            font-size: 12px;
            margin-top: 2px;
        }
        .word-list-meaning {
            color: #636e72;
            margin-top: 4px;
        }
        .unit-header {
            background: #f8f9fa;
            padding: 8px 12px;
            font-weight: 700;
            color: #5e72e4;
            font-size: 14px;
            border-radius: 8px;
            margin: 8px 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #b2bec3;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .tag-blue { background: #e3f2fd; color: #1976d2; }
        .tag-green { background: #e6f9f0; color: #1a7a4e; }

        .checkin-summary {
            text-align: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .checkin-summary-number {
            font-size: 36px;
            font-weight: 800;
            color: #5e72e4;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #2d3436;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===================== 手机端百词斩风格优化 v7 ===================== */
        :root {
            --brand: #20c997;
            --brand-dark: #12a77d;
            --brand-soft: #e9fbf5;
            --ink: #18212f;
            --muted: #7a8796;
            --surface: #ffffff;
            --line: #e7edf3;
            --danger: #ff5c7a;
            --success: #20c997;
            --shadow-card: 0 12px 32px rgba(24, 33, 47, 0.08);
        }
        body {
            background:
                radial-gradient(circle at 16% 0%, rgba(32,201,151,0.15), transparent 30%),
                linear-gradient(180deg, #f3fbf8 0%, #f6f7fb 42%, #f7f8fb 100%);
            color: var(--ink);
        }
        .container { max-width: 560px; padding: 0 14px max(40px, env(safe-area-inset-bottom)); }
        .tabs {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 0 0 22px 22px;
            box-shadow: 0 10px 26px rgba(24,33,47,0.08);
        }
        .tab.active { color: var(--brand-dark); }
        .tab.active::after { background: var(--brand); height: 4px; }
        .card {
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.75);
            box-shadow: var(--shadow-card);
        }
        .card-title::before { background: var(--brand); }
        select, textarea, input {
            border-radius: 16px;
            border-color: var(--line);
            background: #fbfcfe;
        }
        select:focus, textarea:focus, input:focus { border-color: var(--brand); }
        .btn {
            min-height: 48px;
            border-radius: 16px;
            font-size: 16px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand) 0%, #32d79a 100%);
            box-shadow: 0 10px 22px rgba(32,201,151,0.26);
        }
        .btn-success {
            background: linear-gradient(135deg, #2dce89 0%, #20c997 100%);
        }
        .quantity-option.selected {
            border-color: var(--brand);
            background: var(--brand);
        }
        .fullscreen-study {
            background:
                radial-gradient(circle at 50% -6%, rgba(32,201,151,0.20), transparent 34%),
                linear-gradient(180deg, #f2fbf7 0%, #f8f9fb 100%);
        }
        .study-header {
            padding: max(12px, env(safe-area-inset-top)) 16px 12px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .study-progress-text { color: var(--brand-dark); }
        .study-progress-fill { background: linear-gradient(90deg, var(--brand), #70e6bd); }
        .btn-close-study {
            background: #eef6f3;
            color: var(--brand-dark);
        }
        .study-body, .spell-body {
            justify-content: flex-start;
            padding: 18px 16px max(22px, env(safe-area-inset-bottom));
        }
        .word-card, .spell-card {
            width: 100%;
            background: rgba(255,255,255,0.86);
            border: 1px solid rgba(255,255,255,0.88);
            border-radius: 28px;
            box-shadow: var(--shadow-card);
            padding: 22px 16px;
            margin: 14px 0 18px;
        }
        .word-main {
            font-size: clamp(34px, 9vw, 52px);
            letter-spacing: -0.02em;
        }
        .word-pos, .spell-pos-tag {
            background: var(--brand-soft);
            color: var(--brand-dark);
        }
        .word-example, .spell-hint {
            border-left: 0;
            background: #f6fbf9;
            border-radius: 18px;
            color: #344054;
            box-shadow: inset 0 0 0 1px #e4f4ee;
        }
        .btn-replay {
            border-color: #d8f2e9;
            color: var(--brand-dark);
            background: #f4fffb;
            width: 54px;
            height: 54px;
        }

    <div class="tabs">
        <button class="tab active" data-tab="import" onclick="switchTab(this, 'import')">导入单词</button>
        <button class="tab" data-tab="study" onclick="switchTab(this, 'study')">开始记忆</button>
    </div>

    <div class="container">
        <div id="page-import" class="page active">
            <div class="card">
                <div class="card-title">选择词库</div>
                <div class="form-group">
                    <label class="form-label">目标词库</label>
                    <select id="importBank">
                        <option value="7a">七年级上册</option>
                        <option value="7b" selected>七年级下册</option>
                        <option value="8a">八年级上册</option>
                        <option value="8b">八年级下册</option>
                        <option value="9a">九年级上册</option>
                        <option value="9b">九年级下册</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-title">粘贴单词内容</div>
                <div class="form-group">
                    <label class="form-label">支持格式：【单元X】单词 /音标/ 词性 释义 例句</label>
                    <textarea id="importText" placeholder="请粘贴单词内容，例如：
【单元1】advice /əd'vaɪs/ n. 建议 Can you give me some advice on learning English?
【单元1】give up 认输；放弃 Never give up when you face difficulties."></textarea>
                </div>
                <button class="btn btn-primary btn-block" onclick="doImport()">执行导入</button>
                <div class="import-tools-row">
                    <button class="btn btn-secondary" onclick="loadBuiltinTextToImport('8a')" type="button">填入内置八上词库</button>
                    <button class="btn btn-secondary" onclick="importBuiltinBank('8a')" type="button">一键导入八上</button>
                </div>

                <div id="importResult" style="display:none; margin-top:16px;">
                    <div class="stats">
                        <div class="stat-box">
                            <div class="stat-number" id="successCount">0</div>
                            <div class="stat-label">导入成功</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number fail" id="failCount">0</div>
                            <div class="stat-label">导入失败</div>
                        </div>
                    </div>
                    <div id="failDetails" style="margin-top:12px; font-size:13px; color:#f5365c;"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">词库管理</div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="viewBank()">查看已导入内容</button>
                    <button class="btn btn-secondary" onclick="restoreBuiltinBank('7b')">恢复内置七下词库</button>
                    <button class="btn btn-secondary" onclick="restoreBuiltinBank('8a')">恢复内置八上词库</button>
                    <button class="btn btn-danger" onclick="confirmClear()">清空词库</button>
                </div>
            </div>
        </div>

        <div id="page-study" class="page">
            <div class="card" id="studySetupCard">
                <div class="card-title">学习设置</div>
                <div class="form-group">
                    <label class="form-label">选择词库</label>
                    <select id="studyBank" onchange="updateUnitSelect(); rememberCurrentStudyPrefs();">
                        <option value="7a">七年级上册</option>
                        <option value="7b" selected>七年级下册</option>
                        <option value="8a">八年级上册</option>
                        <option value="8b">八年级下册</option>
                        <option value="9a">九年级上册</option>
                        <option value="9b">九年级下册</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">选择单元</label>
                    <select id="studyUnit" onchange="rememberCurrentStudyPrefs();">
                        <option value="all">全部单元</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">本次记忆数量</label>
                    <div class="quantity-selector">
                        <div class="quantity-option" data-value="1" onclick="selectQuantity(this)">1</div>
                        <div class="quantity-option" data-value="25" onclick="selectQuantity(this)">25</div>
                        <div class="quantity-option selected" data-value="50" onclick="selectQuantity(this)">50</div>
                        <div class="quantity-option" data-value="75" onclick="selectQuantity(this)">75</div>
                    </div>
                </div>
                <button class="btn btn-primary btn-block" onclick="startStudy()">开始学习</button>
                <button class="btn btn-secondary btn-block" onclick="showCheckin()" style="margin-top:10px;">打卡记录</button>
            </div>
        </div>
    </div>

    <div id="fullscreenStudy" class="fullscreen-study">
        <div class="study-header">
            <div class="study-header-left">
                <button class="btn-close-study" onclick="exitStudy()">✕</button>
                <span class="study-progress-text" id="fsProgressText">1 / 50</span>
            </div>
            <div style="font-size:13px; color:#8898aa; font-weight:600;" id="fsBankName">七年级下册</div>
            <div class="study-progress-bar">
                <div class="study-progress-fill" id="fsProgressFill" style="width:0%"></div>
            </div>
        </div>

        <div class="study-body" id="fsStudyBody">
            <div class="word-card" id="fsWordCard">
                <div class="word-main-row">
                    <div class="word-main" id="fsWordMain">word</div>
                    <button class="btn-kill-word" id="fsKillWordBtn" onclick="killCurrentWord()" title="斩杀后不再出现">斩杀</button>
                </div>
                <div class="word-phonetic" id="fsWordPhonetic">/phonetic/</div>
                <span class="word-pos" id="fsWordPos">n</span>
                <div class="word-example" id="fsWordExample"></div>
                <button class="btn-replay" onclick="replayAudio()" title="朗读单词和例句">🔊</button>
            </div>
            <div class="options-container" id="fsOptions"></div>
        </div>

        <div class="spell-body" id="fsSpellBody">
            <div class="spell-card" id="fsSpellCard">
                <div class="spell-hint" id="fsSpellHint"></div>
                <div class="spell-pos-tag" id="fsSpellPos"></div>
                <div class="spell-attempts" id="fsSpellAttempts">还可尝试 3 次</div>
                <div class="spell-word-container spell-choice-mode" id="fsSpellWord"></div>
                <div class="spell-choice-helper" id="fsSpellChoiceHelper">点击下方字母/字母组合，依次补全挖空部分</div>
                <div class="spell-choice-grid" id="fsSpellChoices"></div>
                <div class="spell-btn-row spell-action-row">
                    <button class="btn btn-secondary" onclick="clearSpellSelection(true)">重选</button>
                    <button class="btn btn-secondary" onclick="replayCurrentSpellAudio()">朗读</button>
                    <button class="btn btn-primary" onclick="skipSpell()">跳过</button>
                </div>
            </div>
        </div>

        <div id="fsSpellResult" class="spell-result">
            <div class="result-emoji" id="spellResultEmoji">✍️</div>
            <div class="result-title" id="spellResultTitle">拼写测试完成！</div>
            <div class="result-sub" id="spellResultSub">本次拼写正确 8 / 10</div>
            <div class="result-stats-row">
                <div class="result-stat">
                    <div class="result-stat-num" style="color:#2dce89;" id="spellResultCorrect">0</div>
                    <div class="result-stat-label">正确</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-num" style="color:#f5365c;" id="spellResultWrong">0</div>
                    <div class="result-stat-label">错误</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-num" style="color:#5e72e4;" id="spellResultAccuracy">0%</div>
                    <div class="result-stat-label">正确率</div>
                </div>
            </div>
            <div class="result-actions">
                <button class="btn btn-primary" onclick="startStudy()">再来一组</button>
                <button class="btn btn-secondary" onclick="exitStudy()">返回设置</button>
            </div>
        </div>

        <div id="fsResult" class="result-fullscreen">
            <div class="result-emoji" id="resultEmoji">🎉</div>
            <div class="result-title" id="resultTitle">学习完成！</div>
            <div class="result-sub" id="resultSub">本次答对 45 / 50</div>
            <div class="result-stats-row">
                <div class="result-stat">
                    <div class="result-stat-num" style="color:#2dce89;" id="resultCorrect">0</div>
                    <div class="result-stat-label">正确</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-num" style="color:#f5365c;" id="resultWrong">0</div>
                    <div class="result-stat-label">错误</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-num" style="color:#5e72e4;" id="resultAccuracy">0%</div>
                    <div class="result-stat-label">正确率</div>
                </div>
            </div>
            <div class="result-actions">
                <button class="btn btn-primary" onclick="startStudy()">再来一组</button>
                <button class="btn btn-secondary" onclick="exitStudy()">返回设置</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal">
            <div class="modal-header" id="viewModalTitle">已导入内容</div>
            <div class="modal-body" id="viewModalBody">
                <div class="empty-state">暂无内容</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('viewModal')">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="clearModal">
        <div class="modal">
            <div class="modal-header">⚠️ 确认清空</div>
            <div class="modal-body">
                确定要清空 <strong id="clearTarget">七年级下册</strong> 的所有单词内容吗？此操作不可恢复！
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('clearModal')">取消</button>
                <button class="btn btn-danger" onclick="doClear()">确认清空</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="checkinModal">
        <div class="modal">
            <div class="modal-header" id="checkinModalTitle">📅 打卡记录</div>
            <div class="modal-body">
                <div class="checkin-summary">
                    <div class="checkin-summary-number" id="totalDays">0</div>
                    <div id="checkinSummaryLabel" style="color:#8898aa; font-size:14px; margin-top:4px;">累计打卡天数</div>
                </div>
                <div class="checkin-calendar-card">
                    <div class="checkin-calendar-head">
                        <button class="calendar-nav-btn" onclick="changeCheckinMonth(-1)" type="button">‹</button>
                        <div class="checkin-calendar-title" id="checkinCalendarTitle">本月打卡</div>
                        <button class="calendar-nav-btn" onclick="changeCheckinMonth(1)" type="button">›</button>
                    </div>
                    <div class="checkin-week-row">
                        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                    </div>
                    <div class="checkin-calendar-grid" id="checkinCalendarGrid"></div>
                    <div class="checkin-calendar-tip">红圈代表当天已完成学习打卡</div>
                </div>
                <div style="font-size:13px; color:#636e72; margin-bottom:8px;">最近打卡：</div>
                <div id="checkinList" style="font-size:14px;"></div>
            </div>
            <div class="modal-footer checkin-footer">
                <button class="btn btn-primary" onclick="shareCheckinImage()" type="button">分享打卡图</button>
                <button class="btn btn-secondary" onclick="closeModal('checkinModal')">关闭</button>
            </div>
        </div>
    </div>

    <div class="kill-flash-overlay" id="killFlashOverlay">
        <div class="kill-slash-line"></div>
        <div class="kill-flash-symbol">杀</div>
    </div>

    <div class="toast" id="toast"></div>

        function sanitizeWord(word, extractedPos) {
            if (!word) return { word: '', pos: extractedPos || '' };
            let cleaned = word.trim();
            let pos = extractedPos || '';

            // 情况1：word 以词性标记开头，如 "adj. + enough to do sth"
            const leadingPosMatch = cleaned.match(/^(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)\s*(.+)$/i);
            if (leadingPosMatch) {
                pos = pos || leadingPosMatch[1];
                cleaned = leadingPosMatch[2].trim();
            }

            // 情况2：word 尾部有词性标记
            const posList = [
                'n.', 'v.', 'adj.', 'adv.', 'prep.', 'conj.', 'pron.', 'det.', 'art.', 'num.', 'int.', 'abbr.', 'phr.', 'aux.', 'modal.', 'vi.', 'vt.', 'link-v.',
                'n', 'v', 'adj', 'adv', 'prep', 'conj', 'pron', 'det', 'art', 'num', 'int', 'abbr', 'phr', 'aux', 'modal', 'vi', 'vt', 'link-v'
            ];
            for (const p of posList) {
                const esc = p.replace(/\./g, '\\.');
                const re = new RegExp('\\s+' + esc + '\\s*$', 'i');
                if (re.test(cleaned)) {
                    cleaned = cleaned.replace(re, '').trim();
                    if (!pos) pos = p.endsWith('.') ? p : p + '.';
                    break;
                }
            }

            // 清理尾部标点
            cleaned = cleaned.replace(/[;；,，.\-]+$/, '').trim();
            return { word: cleaned, pos: pos };
        }

                if (type === 'correct' || type === 'wrong' || type === 'kill') {

                        audio = new Audio(src);
                        audio.preload = 'auto';
                        audio.playsInline = true;
                        customSoundPlayers[type] = audio;
                    }
                    audio.pause();
                    audio.currentTime = 0;

                const p = audio.play();

            } catch (e) {

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(2600, now + 0.02);
                filter.frequency.exponentialRampToValueAtTime(760, now + 0.26);
                filter.Q.value = 1.2;
                const whooshGain = audioCtx.createGain();
                whooshGain.gain.setValueAtTime(0.32, now + 0.015);
                whooshGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                whoosh.connect(filter);
                filter.connect(whooshGain);
                whooshGain.connect(master);
                whoosh.start(now + 0.015);
                whoosh.stop(now + 0.32);

                const thump = audioCtx.createOscillator();
                const thumpGain = audioCtx.createGain();
                thump.type = 'sine';
                thump.frequency.setValueAtTime(155, now + 0.12);
                thump.frequency.exponentialRampToValueAtTime(72, now + 0.38);
                thumpGain.gain.setValueAtTime(0.42, now + 0.12);
                thumpGain.gain.exponentialRampToValueAtTime(0.001, now + 0.46);
                thump.connect(thumpGain);
                thumpGain.connect(master);
                thump.start(now + 0.12);
                thump.stop(now + 0.48);
            }
        }

        // ===================== 解析器（增强容错） =====================
        function parseLine(line) {
            line = line.trim();
            if (!line) return null;
            const unitMatch = line.match(/【单元\s*(\d+)】/);
            if (!unitMatch) return null;
            const unit = parseInt(unitMatch[1]);
            let content = line.replace(/【单元\s*\d+】/, '').trim();
            if (!content) return null;

            let word = '', phonetic = '', pos = '', meaning = '', example = '';

            // 1. 提取音标
            const phoneticMatch = content.match(/(\/[^\/]+\/)/);
            if (phoneticMatch) {
                phonetic = phoneticMatch[1];
                const idxPhonetic = content.indexOf(phonetic);
                word = content.substring(0, idxPhonetic).trim();
                content = content.substring(idxPhonetic + phonetic.length).trim();
            } else {
                const firstChinese = content.search(/[\u4e00-\u9fa5]/);
                if (firstChinese === -1) {
                    word = content;
                    content = '';
                } else {
                    word = content.substring(0, firstChinese).trim();
                    content = content.substring(firstChinese).trim();
                }
            }

            // 2. 从单词尾部提取词性
            const trailingPosMatch = word.match(/\s+(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)$/i);
            if (trailingPosMatch) {
                pos = trailingPosMatch[1];
                word = word.substring(0, trailingPosMatch.index).trim();
            }

            // 3. 从剩余内容开头提取词性
            if (!pos) {
                const posPattern = /^(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)/;
                const posMatch = content.match(posPattern);
                if (posMatch) {
                    pos = posMatch[1];
                    content = content.substring(pos.length).trim();
                } else {
                    const altPos = content.match(/^\s*([a-z]+\.)\s+/);
                    if (altPos && altPos[1].length <= 6) {
                        pos = altPos[1];
                        content = content.substring(pos.length).trim();
                    }
                }
            }

            // 4. 分离释义和例句
            if (content) {
                const sentences = content.match(/[A-Z][^。？！]*[.!?]/g);
                if (sentences && sentences.length > 0) {
                    const lastSentence = sentences[sentences.length - 1];
                    const idx = content.lastIndexOf(lastSentence);
                    if (idx > 0) {
                        meaning = content.substring(0, idx).trim();
                        example = content.substring(idx).trim();
                    } else {
                        example = content.trim();
                    }
                } else {
                    meaning = content.trim();
                }
            }

            word = word.replace(/\s+/g, ' ').trim();
            word = word.replace(/[;；,，.]$/, '').trim();

            // 5. 最终清理：处理 word 以词性开头或尾部残留词性
            const cleaned = sanitizeWord(word, pos);
            word = cleaned.word;
            pos = cleaned.pos;

            if (!word) return null;
            return { unit, word, phonetic, pos, meaning, example };
        }

        function buildBankFromText(text) {
            const bank = {};
            (text || '').split(/\r?\n/).forEach(line => {
                const parsed = parseLine(line);
                if (parsed) {
                    const unitKey = 'unit' + parsed.unit;
                    if (!bank[unitKey]) bank[unitKey] = [];
                    const cleanWord = sanitizeWord(parsed.word).word;
                    const existsIdx = bank[unitKey].findIndex(w => sanitizeWord(w.word).word === cleanWord && (w.meaning || '') === (parsed.meaning || ''));
                    if (existsIdx === -1) bank[unitKey].push(parsed);
                    else bank[unitKey][existsIdx] = parsed;
                }
            });
            return bank;
        }

            const today = getLocalDateString(0);

            // 昨天或今天已做对的词，默认不再进入新词随机池；错题复习优先级更高。
            return item.lastCorrectDate === today || item.lastCorrectDate === yesterday;

                if (!currentKilledKeySet.has(key)) studiedKeys.add(key);
            });

            studiedKeys.forEach(key => {
                const item = history[key] || {};
                item.totalSeen = (item.totalSeen || 0) + 1;
                item.lastSeenDate = today;

                    item.wrongCount = (item.wrongCount || 0) + 1;

        function startStudy() {
            clearStudyTimers();
            isAnswering = false;
            initAudio();
            preloadCustomSounds();
            const startSoundMs = Math.max(800, CUSTOM_SOUND_DURATION_MS.kill || 1200);
            playSound('kill');
            if (speechSynth && speechSynth.paused) speechSynth.resume();
            initSpeech();

            const bankId = document.getElementById('studyBank').value;
            currentStudyBankId = bankId;
            currentWrongKeySet = new Set();
            currentHighPriorityWrongKeySet = new Set();
            currentChoiceMistakeMap = new Map();
            currentKilledKeySet = new Set(getKilledKeys());
            const unit = document.getElementById('studyUnit').value;
            const quantity = getSelectedQuantity();
            rememberCurrentStudyPrefs();
            currentStudyQuantity = quantity;
            isTestMode = quantity === 1;
            const bank = getBank(bankId);

            let pool = [];
            if (unit === 'all') {
                Object.values(bank).forEach(arr => pool.push(...arr));
            } else {
                pool = bank[unit] || [];
            }

            if (pool.length === 0) {
                showToast('该词库/单元暂无单词，请先导入');
                return;
            }

            // 被斩杀的单词不再进入学习池；错题优先出现在下次学习开头。
            pool = pool.filter(w => !currentKilledKeySet.has(getWordKey(bankId, w)));
            if (pool.length === 0) {
                showToast('该范围内的单词已全部斩杀或暂无可学习单词');
                return;
            }
            const targetCount = Math.min(quantity, pool.length);
            const reviewKeysArray = getReviewKeysForBank(bankId);
            const reviewKeys = new Set(reviewKeysArray);

            // 选词策略：
            // 1）上次多次答错/拼写错题高优先级出现；
            // 2）普通错题其次；
            // 3）昨天或今天已做对的词，不进入新词随机池；
            // 4）如果可选新词不足，再用近期做对词补足。
            const highPriorityWords = reviewKeysArray
                .map(key => pool.find(w => getWordKey(bankId, w) === key))
                .filter(Boolean);
            const reviewWords = pool
                .filter(w => reviewKeys.has(getWordKey(bankId, w)) && !highPriorityWords.includes(w))
                .sort(() => Math.random() - 0.5);
            const normalNewWords = pool
                .filter(w => {
                    const key = getWordKey(bankId, w);
                    return !reviewKeys.has(key) && !wasRecentlyCorrect(key);
                })
                .sort(() => Math.random() - 0.5);
            const recentCorrectFallback = pool
                .filter(w => {
                    const key = getWordKey(bankId, w);
                    return !reviewKeys.has(key) && wasRecentlyCorrect(key);
                })
                .sort(() => Math.random() - 0.5);

            studyWords = [...highPriorityWords, ...reviewWords, ...normalNewWords, ...recentCorrectFallback].slice(0, targetCount);
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;

            document.getElementById('fullscreenStudy').classList.add('active');
            document.getElementById('fsResult').classList.remove('active');
            document.getElementById('fsSpellBody').classList.remove('active');
            document.getElementById('fsSpellResult').classList.remove('active');
            document.getElementById('fsStudyBody').style.display = 'flex';
            document.getElementById('fsBankName').textContent = bankNames[bankId];

            // 点击开始学习后，等斩杀音效结束再开始朗读第一个单词。
            studyTimeoutId = setTimeout(() => showQuestion(), startSoundMs);
        }

        function showQuestion() {
            clearStudyTimers();
            isAnswering = false; // 新题目解锁
            const oldOptions = document.getElementById('fsOptions');
            if (oldOptions) oldOptions.innerHTML = '';
            const q = studyWords[currentIndex];

            // 强制清理所有旧选项状态（双重保险）
            container.querySelectorAll('.option').forEach(o => {

            });

            options.forEach((opt) => {

        function generateOptions(correctWord, allWords) {
            const correct = { text: correctWord.meaning || correctWord.word, correct: true };
            const allBanks = getBanks();
            let globalPool = [];
            Object.values(allBanks).forEach(bank => {
                Object.values(bank).forEach(unitWords => {
                    if (Array.isArray(unitWords)) globalPool.push(...unitWords);
                });
            });
            const wrongPool = globalPool.filter(w => w.word !== correctWord.word && (w.meaning || w.word));
            let wrongs = [];
            if (wrongPool.length >= 3) {
                const shuffled = wrongPool.sort(() => Math.random() - 0.5).slice(0, 3);
                wrongs = shuffled.map(w => ({ text: w.meaning || w.word, correct: false }));
            } else if (wrongPool.length > 0) {
                const shuffled = wrongPool.sort(() => Math.random() - 0.5).slice(0, Math.min(3, wrongPool.length));
                wrongs = shuffled.map(w => ({ text: w.meaning || w.word, correct: false }));
                while (wrongs.length < 3) wrongs.push({ text: '（其他释义）', correct: false });
            } else {
                wrongs = [
                    { text: '（其他释义）', correct: false },
                    { text: '（其他释义）', correct: false },
                    { text: '（其他释义）', correct: false }
                ];
            }
            const all = [correct, ...wrongs];
            return all.sort(() => Math.random() - 0.5);
        }

        function selectOption(el, isCorrect) {
            if (isAnswering) return;

            const q = studyWords[currentIndex];
            const key = getWordKey(currentStudyBankId, q);
            const options = document.querySelectorAll('#fsOptions .option');

            if (isCorrect) {
                isAnswering = true;
                el.classList.add('correct');
                if (!el.querySelector('.option-marker')) el.innerHTML += '<span class="option-marker">✓</span>';
                correctCount++;
                playSound('correct');

                options.forEach(o => o.classList.add('disabled'));
                studyTimeoutId = setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < studyWords.length) showQuestion();
                    else finishStudy();
                }, 700);
            } else {
                const tries = (currentChoiceMistakeMap.get(key) || 0) + 1;
                currentChoiceMistakeMap.set(key, tries);

                // 错误不跳题，只标记当前错误选项并允许继续选择。
                if (!el.classList.contains('wrong')) {
                    el.classList.add('wrong');
                    if (!el.querySelector('.option-marker')) el.innerHTML += '<span class="option-marker">✗</span>';
                }
                el.classList.add('disabled');
                el.onclick = null;
                wrongCount++;
                playSound('wrong');

                if (tries > 1) {
                    markCurrentWordHighPriorityWrong(q);
                    showToast('已加入下次高优先级复习，继续选择正确释义');
                } else {
                    showToast('不对，再试一次');
                }
            }
        }

        // ===================== 拼写测试 =====================

        let spellWrong = 0;

        let currentSpellBlank = null;

        function startSpellTest() {
            if (studyWords.length === 0) {
                spellWords = [];

                finishSpellTest();

            clearStudyTimers();

        function showSpellQuestion() {
            const q = spellWords[spellIndex];
            currentSpellWord = q;
            const total = spellWords.length;
            document.getElementById('fsProgressText').textContent = `拼写 ${spellIndex + 1} / ${total}`;
            document.getElementById('fsProgressFill').style.width = `${((spellIndex + 1) / total * 100)}%`;

            // 关键修复：用 sanitizeWord 确保拼写单词不含词性
            const spellWord = sanitizeWord(q.word).word;
            const blankInfo = generateBlank(spellWord);

            let hintText = '';

                const div = document.createElement('div');
                if (item.type === 'space') {

                    div.textContent = '';
                } else if (item.type === 'shown') {
                    div.className = 'spell-char filled';
                    div.textContent = item.char;
                } else {
                    div.className = 'spell-char blank';
                    div.textContent = '';
                }
                container.appendChild(div);
            });

            speakOnlyWord(spellWord);

            const input = document.getElementById('fsSpellInput');
            input.value = '';
            input.className = 'spell-input';
            input.disabled = false;
            setTimeout(() => input.focus(), 100);
        }

        function generateBlank(word) {
            const chars = word.split('');
            const letterIndices = [];
            chars.forEach((c, i) => { if (/[a-zA-Z]/.test(c)) letterIndices.push(i); });
            const len = letterIndices.length;
            let hideCount = Math.max(1, Math.floor(len * 0.4));
            hideCount = Math.min(hideCount, len);
            if (len <= 2) hideCount = 1;
            const shuffled = [...letterIndices].sort(() => Math.random() - 0.5);
            const blankIndices = new Set(shuffled.slice(0, hideCount));
            const displayChars = chars.map((c, i) => {
                if (c === ' ') return { type: 'space', char: ' ' };
                else if (blankIndices.has(i)) return { type: 'blank', char: c };
                else return { type: 'shown', char: c };
            });
            return { fullWord: word, displayChars, blankIndices: Array.from(blankIndices) };
        }

        function handleSpellKey(e) {
            if (e.key === 'Enter') submitSpell();
        }

        function submitSpell() {
            const input = document.getElementById('fsSpellInput');
            const userAnswer = input.value.trim().toLowerCase();
            const correctAnswer = currentSpellBlank.fullWord.toLowerCase();
            if (!userAnswer) { showToast('请输入答案'); return; }
            input.disabled = true;

            if (userAnswer === correctAnswer) {
                spellCorrect++;
                playSound('correct');
                input.classList.add('correct');
                const container = document.getElementById('fsSpellWord');
                container.innerHTML = '';
                currentSpellBlank.fullWord.split('').forEach(char => {
                    const div = document.createElement('div');
                    if (char === ' ') div.className = 'spell-char space-char';
                    else { div.className = 'spell-char correct-reveal'; div.textContent = char; }
                    container.appendChild(div);
                });
                if (spellIndex >= spellWords.length - 1) {
                    studyTimeoutId = setTimeout(() => finishSpellTest(), 1000);
                } else {
                    studyTimeoutId = setTimeout(() => nextSpell(), 1000);
                }
            } else {
                spellWrong++;
                playSound('wrong');
                input.classList.add('wrong');
                const container = document.getElementById('fsSpellWord');
                container.innerHTML = '';
                currentSpellBlank.fullWord.split('').forEach((char, idx) => {
                    const div = document.createElement('div');
                    const wasBlank = currentSpellBlank.blankIndices.includes(idx);
                    if (char === ' ') div.className = 'spell-char space-char';
                    else if (wasBlank) { div.className = 'spell-char wrong-reveal'; div.textContent = char; }
                    else { div.className = 'spell-char correct-reveal'; div.textContent = char; }
                    container.appendChild(div);
                });
                studyTimeoutId = setTimeout(() => nextSpell(), 1800);
            }
        }

        function skipSpell() {
            spellWrong++;

            const input = document.getElementById('fsSpellInput');

        // ===================== 打卡功能 =====================
        let checkinCalendarDate = new Date();

        function formatLocalDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function renderCheckinCalendar(records) {
            const grid = document.getElementById('checkinCalendarGrid');
            const title = document.getElementById('checkinCalendarTitle');
            if (!grid || !title) return;

            const y = checkinCalendarDate.getFullYear();
            const m = checkinCalendarDate.getMonth();
            title.textContent = `${y}年${m + 1}月打卡日历`;
            grid.innerHTML = '';

            const recordSet = new Set(records);
            const first = new Date(y, m, 1);
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const startDay = first.getDay();
            const todayKey = formatLocalDate(new Date());

            for (let i = 0; i < startDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day muted';
                empty.textContent = '0';
                grid.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(y, m, day);
                const key = formatLocalDate(d);
                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                if (recordSet.has(key)) cell.classList.add('checked');
                if (key === todayKey) cell.classList.add('today');
                cell.textContent = day;
                grid.appendChild(cell);
            }
        }

        function changeCheckinMonth(delta) {
            checkinCalendarDate = new Date(checkinCalendarDate.getFullYear(), checkinCalendarDate.getMonth() + delta, 1);
            renderCheckinCalendar(getCheckins());
        }


        function calculateCheckinStreak(records) {
            if (!records || records.length === 0) return 0;
            const set = new Set(records);
            const today = new Date();
            let cursor = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            let streak = 0;

            // 如果今天未打卡，则从最近一次打卡日开始算连续天数。
            if (!set.has(formatLocalDate(cursor))) {
                const sorted = [...records].sort();
                const last = sorted[sorted.length - 1];
                if (!last) return 0;
                const [y, m, d] = last.split('-').map(Number);
                cursor = new Date(y, m - 1, d);
            }

            while (set.has(formatLocalDate(cursor))) {
                streak++;
                cursor.setDate(cursor.getDate() - 1);
            }
            return streak;
        }

                        <span>✅ 完成学习打卡</span>
                        <span style="color:#8898aa;">${fmt}</span>
                    </div>`;
                });
            }
            document.getElementById('checkinList').innerHTML = listHtml;
            document.getElementById('checkinModal').classList.add('active');
        }

        function drawRoundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        async function shareCheckinImage() {
            const records = getCheckins();

            const today = new Date();

            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1500;
            const ctx = canvas.getContext('2d');

            const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);

            bg.addColorStop(1, '#f7f8fb');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(32,201,151,0.16)';

            drawRoundRect(ctx, 90, 260, 900, 260, 42);

            ctx.fillStyle = '#20c997';
            ctx.font = '900 96px -apple-system, BlinkMacSystemFont, Arial';

            ctx.fillStyle = '#637083';
            ctx.font = '600 32px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText('连续打卡天数', 540, 445);
            ctx.fillStyle = '#8a96a8';
            ctx.font = '500 26px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText(`累计打卡 ${total} 天`, 540, 488);

            drawRoundRect(ctx, 90, 580, 900, 700, 42);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(24,33,47,0.08)';
            ctx.shadowBlur = 24;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#18212f';
            ctx.font = '800 40px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText(`${y}年${m + 1}月打卡日历`, 540, 650);

            const week = ['日','一','二','三','四','五','六'];

                if (recordSet.has(key)) {

                    ctx.lineWidth = 6;

                }

            ctx.fillStyle = '#637083';

            canvas.toBlob(async (blob) => {
