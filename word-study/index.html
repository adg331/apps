<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万词斩-考Yan专用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f6fa;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px 40px; }

        .tabs {
            display: flex;
            background: #fff;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            border: none;
            background: none;
        }
        .tab.active {
            color: #5e72e4;
            font-weight: 700;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: #5e72e4;
            border-radius: 3px 3px 0 0;
        }

        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #5e72e4;
            border-radius: 2px;
        }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #636e72;
            margin-bottom: 6px;
        }
        select, textarea, input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 15px;
            background: #fafbfc;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #5e72e4;
            background: #fff;
        }
        textarea { resize: vertical; min-height: 200px; line-height: 1.8; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: #5e72e4;
            color: #fff;
            box-shadow: 0 4px 12px rgba(94,114,228,0.3);
        }
        .btn-primary:active { transform: translateY(1px); }
        .btn-success {
            background: #2dce89;
            color: #fff;
            box-shadow: 0 4px 12px rgba(45,206,137,0.3);
        }
        .btn-danger {
            background: #f5365c;
            color: #fff;
            box-shadow: 0 4px 12px rgba(245,54,92,0.3);
        }
        .btn-secondary {
            background: #8898aa;
            color: #fff;
        }
        .btn-block { width: 100%; margin-top: 12px; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn-group .btn { flex: 1; }

        .quantity-selector {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .quantity-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background: #fafbfc;
        }
        .quantity-option.selected {
            border-color: #5e72e4;
            background: #5e72e4;
            color: #fff;
        }

        .stats { display: flex; gap: 12px; margin-top: 16px; }
        .stat-box {
            flex: 1;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #2dce89;
        }
        .stat-number.fail { color: #f5365c; }
        .stat-label {
            font-size: 12px;
            color: #8898aa;
            margin-top: 4px;
        }

        .fullscreen-study {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f5f6fa;
            z-index: 200;
            flex-direction: column;
            overflow: hidden;
        }
        .fullscreen-study.active { display: flex; }

        .study-header {
            background: #fff;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2;
            position: relative;
        }
        .study-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-close-study {
            background: #f5f6fa;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            color: #636e72;
        }
        .study-progress-text {
            font-size: 14px;
            font-weight: 700;
            color: #5e72e4;
        }
        .study-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #e1e8ed;
        }
        .study-progress-fill {
            height: 100%;
            background: #5e72e4;
            transition: width 0.3s ease;
        }

        .study-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        .word-card {
            text-align: center;
            margin-bottom: 28px;
            animation: slideUp 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .word-main {
            font-size: 36px;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .word-phonetic {
            font-size: 18px;
            color: #8898aa;
            font-family: "Times New Roman", serif;
            margin-bottom: 8px;
        }
        .word-pos {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .word-example {
            margin-top: 16px;
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            max-width: 100%;
            padding: 12px 18px;
            background: #fff;
            border-radius: 12px;
            border-left: 4px solid #5e72e4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: left;
            font-style: italic;
        }
        .word-example:empty { display: none; }

        .btn-replay {
            margin-top: 14px;
            background: #fff;
            border: 2px solid #e1e8ed;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.2s;
            color: #5e72e4;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .btn-replay:hover {
            border-color: #5e72e4;
            background: #f5f7ff;
            transform: scale(1.08);
        }
        .btn-replay:active { transform: scale(0.95); }

        .options-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 20px;
        }
        .option {
            padding: 18px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 16px;
            cursor: pointer;
            font-size: 17px;
            transition: all 0.2s;
            background: #fff;
            text-align: left;
            position: relative;
            overflow: hidden;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .option:hover { border-color: #b0c4de; background: #f8f9ff; transform: translateY(-1px); }
        .option.correct {
            border-color: #2dce89;
            background: #e6f9f0;
            color: #1a7a4e;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(45,206,137,0.15);
        }
        .option.wrong {
            border-color: #f5365c;
            background: #ffe6ea;
            color: #c41e3a;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(245,54,92,0.15);
        }
        .option.disabled { pointer-events: none; }
        .option-marker {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            font-weight: 800;
        }

        .spell-body {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        .spell-body.active { display: flex; }
        .spell-card {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 100%;
        }
        .spell-hint {
            font-size: 18px;
            color: #636e72;
            margin-bottom: 16px;
            line-height: 1.6;
            padding: 12px 18px;
            background: #fff;
            border-radius: 12px;
            border-left: 4px solid #2dce89;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: left;
            width: 100%;
        }
        .spell-hint:empty { display: none; }
        .spell-pos-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .spell-word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 20px 0;
            min-height: 60px;
            align-items: center;
        }
        .spell-char {
            width: 40px;
            height: 52px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            background: #fff;
            transition: all 0.2s;
        }
        .spell-char.filled {
            border-color: #5e72e4;
            color: #5e72e4;
            background: #f5f7ff;
        }
        .spell-char.blank {
            border-color: #cbd5e0;
            border-style: dashed;
            background: #fafbfc;
            color: #8898aa;
        }
        .spell-char.space-char {
            border-color: transparent;
            background: transparent;
            width: 20px;
        }
        .spell-char.correct-reveal {
            border-color: #2dce89;
            color: #2dce89;
            background: #e6f9f0;
            animation: popIn 0.3s ease;
        }
        .spell-char.wrong-reveal {
            border-color: #f5365c;
            color: #f5365c;
            background: #ffe6ea;
            animation: shake 0.4s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .spell-input-area {
            width: 100%;
            max-width: 100%;
            margin-top: 8px;
        }
        .spell-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 14px;
            font-size: 20px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            background: #fff;
            transition: border-color 0.2s;
        }
        .spell-input:focus {
            outline: none;
            border-color: #5e72e4;
        }
        .spell-input.correct {
            border-color: #2dce89;
            background: #e6f9f0;
        }
        .spell-input.wrong {
            border-color: #f5365c;
            background: #ffe6ea;
        }
        .spell-btn-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            width: 100%;
            max-width: 100%;
        }
        .spell-btn-row .btn { flex: 1; }

        .spell-result {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.5s;
            overflow-y: auto;
        }
        .spell-result.active { display: flex; }

        .result-fullscreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.5s;
            overflow-y: auto;
        }
        .result-fullscreen.active { display: flex; }
        .result-emoji { font-size: 72px; margin-bottom: 20px; }
        .result-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: #2d3436; }
        .result-sub { color: #8898aa; margin-bottom: 28px; font-size: 16px; }
        .result-stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            width: 100%;
            max-width: 100%;
        }
        .result-stat {
            flex: 1;
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .result-stat-num {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .result-stat-label { font-size: 12px; color: #8898aa; }
        .result-actions {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 100%;
        }
        .result-actions .btn { flex: 1; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: modalIn 0.3s;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            padding: 20px 20px 0;
            font-size: 18px;
            font-weight: 800;
        }
        .modal-body {
            padding: 16px 20px;
            overflow-y: auto;
            max-height: 50vh;
            font-size: 14px;
            line-height: 1.8;
        }
        .modal-footer {
            padding: 12px 20px 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-footer .btn { padding: 10px 20px; }

        .word-list-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .word-list-item:last-child { border-bottom: none; }
        .word-list-term {
            font-weight: 700;
            color: #2d3436;
            font-size: 15px;
        }
        .word-list-meta {
            color: #8898aa;
            font-size: 12px;
            margin-top: 2px;
        }
        .word-list-meaning {
            color: #636e72;
            margin-top: 4px;
        }
        .unit-header {
            background: #f8f9fa;
            padding: 8px 12px;
            font-weight: 700;
            color: #5e72e4;
            font-size: 14px;
            border-radius: 8px;
            margin: 8px 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #b2bec3;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .tag-blue { background: #e3f2fd; color: #1976d2; }
        .tag-green { background: #e6f9f0; color: #1a7a4e; }

        .checkin-summary {
            text-align: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .checkin-summary-number {
            font-size: 36px;
            font-weight: 800;
            color: #5e72e4;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #2d3436;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===================== 手机端百词斩风格优化 v7 ===================== */
        :root {
            --brand: #20c997;
            --brand-dark: #12a77d;
            --brand-soft: #e9fbf5;
            --ink: #18212f;
            --muted: #7a8796;
            --surface: #ffffff;
            --line: #e7edf3;
            --danger: #ff5c7a;
            --success: #20c997;
            --shadow-card: 0 12px 32px rgba(24, 33, 47, 0.08);
        }
        body {
            background:
                radial-gradient(circle at 16% 0%, rgba(32,201,151,0.15), transparent 30%),
                linear-gradient(180deg, #f3fbf8 0%, #f6f7fb 42%, #f7f8fb 100%);
            color: var(--ink);
        }
        .container { max-width: 560px; padding: 0 14px max(40px, env(safe-area-inset-bottom)); }
        .tabs {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 0 0 22px 22px;
            box-shadow: 0 10px 26px rgba(24,33,47,0.08);
        }
        .tab.active { color: var(--brand-dark); }
        .tab.active::after { background: var(--brand); height: 4px; }
        .card {
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.75);
            box-shadow: var(--shadow-card);
        }
        .card-title::before { background: var(--brand); }
        select, textarea, input {
            border-radius: 16px;
            border-color: var(--line);
            background: #fbfcfe;
        }
        select:focus, textarea:focus, input:focus { border-color: var(--brand); }
        .btn {
            min-height: 48px;
            border-radius: 16px;
            font-size: 16px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand) 0%, #32d79a 100%);
            box-shadow: 0 10px 22px rgba(32,201,151,0.26);
        }
        .btn-success {
            background: linear-gradient(135deg, #2dce89 0%, #20c997 100%);
        }
        .quantity-option.selected {
            border-color: var(--brand);
            background: var(--brand);
        }
        .fullscreen-study {
            background:
                radial-gradient(circle at 50% -6%, rgba(32,201,151,0.20), transparent 34%),
                linear-gradient(180deg, #f2fbf7 0%, #f8f9fb 100%);
        }
        .study-header {
            padding: max(12px, env(safe-area-inset-top)) 16px 12px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .study-progress-text { color: var(--brand-dark); }
        .study-progress-fill { background: linear-gradient(90deg, var(--brand), #70e6bd); }
        .btn-close-study {
            background: #eef6f3;
            color: var(--brand-dark);
        }
        .study-body, .spell-body {
            justify-content: flex-start;
            padding: 18px 16px max(22px, env(safe-area-inset-bottom));
        }
        .word-card, .spell-card {
            width: 100%;
            background: rgba(255,255,255,0.86);
            border: 1px solid rgba(255,255,255,0.88);
            border-radius: 28px;
            box-shadow: var(--shadow-card);
            padding: 22px 16px;
            margin: 14px 0 18px;
        }
        .word-main {
            font-size: clamp(34px, 9vw, 52px);
            letter-spacing: -0.02em;
        }
        .word-pos, .spell-pos-tag {
            background: var(--brand-soft);
            color: var(--brand-dark);
        }
        .word-example, .spell-hint {
            border-left: 0;
            background: #f6fbf9;
            border-radius: 18px;
            color: #344054;
            box-shadow: inset 0 0 0 1px #e4f4ee;
        }
        .btn-replay {
            border-color: #d8f2e9;
            color: var(--brand-dark);
            background: #f4fffb;
            width: 54px;
            height: 54px;
        }
        .options-container { gap: 14px; }

    <script>
        const DB_KEY = 'wordBanks_v1';
        const CHECKIN_KEY = 'checkinRecords_v1';

        const bankNames = {
            '7a': '七年级上册', '7b': '七年级下册',
            '8a': '八年级上册', '8b': '八年级下册',
            '9a': '九年级上册', '9b': '九年级下册'
        };

        function getBanks() {
            const raw = localStorage.getItem(DB_KEY);
            return raw ? JSON.parse(raw) : {};
        }
        function saveBanks(banks) {
            localStorage.setItem(DB_KEY, JSON.stringify(banks));
        }
        function getBank(bankId) {
            const banks = getBanks();
            return banks[bankId] || {};
        }
        function saveBank(bankId, data) {
            const banks = getBanks();
            banks[bankId] = data;
            saveBanks(banks);
        }
        function getCheckins() {
            const raw = localStorage.getItem(CHECKIN_KEY);
            return raw ? JSON.parse(raw) : [];
        }
        function addCheckin() {
            const today = new Date().toISOString().split('T')[0];
            const records = getCheckins();
            if (!records.includes(today)) {
                records.push(today);
                records.sort();
                localStorage.setItem(CHECKIN_KEY, JSON.stringify(records));
            }
        }

        // ===================== 增强版单词清理 =====================
        function sanitizeWord(word, extractedPos) {
            if (!word) return { word: '', pos: extractedPos || '' };
            let cleaned = word.trim();
            let pos = extractedPos || '';

            // 情况1：word 以词性标记开头，如 "adj. + enough to do sth"
            const leadingPosMatch = cleaned.match(/^(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)\s*(.+)$/i);
            if (leadingPosMatch) {
                pos = pos || leadingPosMatch[1];
                cleaned = leadingPosMatch[2].trim();
            }

            // 情况2：word 尾部有词性标记
            const posList = [
                'n.', 'v.', 'adj.', 'adv.', 'prep.', 'conj.', 'pron.', 'det.', 'art.', 'num.', 'int.', 'abbr.', 'phr.', 'aux.', 'modal.', 'vi.', 'vt.', 'link-v.',
                'n', 'v', 'adj', 'adv', 'prep', 'conj', 'pron', 'det', 'art', 'num', 'int', 'abbr', 'phr', 'aux', 'modal', 'vi', 'vt', 'link-v'
            ];
            for (const p of posList) {
                const esc = p.replace(/\./g, '\\.');
                const re = new RegExp('\\s+' + esc + '\\s*$', 'i');
                if (re.test(cleaned)) {
                    cleaned = cleaned.replace(re, '').trim();
                    if (!pos) pos = p.endsWith('.') ? p : p + '.';
                    break;
                }
            }

            // 清理尾部标点
            cleaned = cleaned.replace(/[;；,，.\-]+$/, '').trim();
            return { word: cleaned, pos: pos };
        }

        // ===================== 音效系统 =====================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            if (type === 'correct') {
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    osc.start(now + i * 0.08);
                    gain.gain.setValueAtTime(0.25, now + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.35);
                    osc.stop(now + i * 0.08 + 0.35);
                });
            } else if (type === 'wrong') {
                [220.00, 174.61].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    osc.start(now + i * 0.12);
                    gain.gain.setValueAtTime(0.25, now + i * 0.12);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.3);
                    osc.stop(now + i * 0.12 + 0.3);
                });
            } else if (type === 'complete') {
                [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    osc.start(now + i * 0.09);
                    gain.gain.setValueAtTime(0.22, now + i * 0.09);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.09 + 0.5);
                    osc.stop(now + i * 0.09 + 0.5);
                });
            }
        }

        // ===================== 语音系统：使用浏览器默认英文语音 =====================
        let speechSynth = window.speechSynthesis || null;

        function initSpeech() {
            // 保留初始化入口，兼容原有调用；不再提供手动选择语音。
            // 朗读时不指定 voice，由浏览器/系统按 lang 自动选择默认英文语音。
            if (!speechSynth) return;
            if (speechSynth.getVoices) speechSynth.getVoices();
        }

        if (speechSynth && speechSynth.onvoiceschanged !== undefined) {
            speechSynth.onvoiceschanged = initSpeech;
        }
        initSpeech();

        function stopSpeech() {
            if (speechSynth) speechSynth.cancel();
        }
        function cleanTextForSpeech(text) {
            if (!text) return '';
            return text
                .replace(/\s*\b(n\.?|v\.?|adj\.?|adv\.?|prep\.?|conj\.?|pron\.?|det\.?|art\.?|num\.?|int\.?|abbr\.?|phr\.?|aux\.?|modal\.?|vi\.?|vt\.?|link-v\.?)\b\s*/gi, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }
        function speakWordAndExample(word, example) {
            if (!speechSynth || !word) return;
            speechSynth.cancel();
            const cleanWord = cleanTextForSpeech(word);
            const cleanExample = cleanTextForSpeech(example);
            const u1 = new SpeechSynthesisUtterance(cleanWord);
            u1.lang = 'en-US'; u1.rate = 0.85; u1.pitch = 1.0;
            const u2 = cleanExample ? new SpeechSynthesisUtterance(cleanExample) : null;
            if (u2) { u2.lang = 'en-US'; u2.rate = 0.82; u2.pitch = 1.0; }
            u1.onend = () => { if (u2) speechSynth.speak(u2); };
            speechSynth.speak(u1);
        }
        function speakOnlyWord(word) {
            if (!speechSynth || !word) return;
            speechSynth.cancel();
            const cleanWord = cleanTextForSpeech(word);
            const u = new SpeechSynthesisUtterance(cleanWord);
            u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.0;
            speechSynth.speak(u);
        }
        function replayAudio() {
            if (currentIndex < studyWords.length) {
                const q = studyWords[currentIndex];
                speakWordAndExample(q.word, q.example);
            }
        }

        // ===================== 解析器（增强容错） =====================
        function parseLine(line) {
            line = line.trim();
            if (!line) return null;
            const unitMatch = line.match(/【单元\s*(\d+)】/);
            if (!unitMatch) return null;
            const unit = parseInt(unitMatch[1]);
            let content = line.replace(/【单元\s*\d+】/, '').trim();
            if (!content) return null;

            let word = '', phonetic = '', pos = '', meaning = '', example = '';

            // 1. 提取音标
            const phoneticMatch = content.match(/(\/[^\/]+\/)/);
            if (phoneticMatch) {
                phonetic = phoneticMatch[1];
                const idxPhonetic = content.indexOf(phonetic);
                word = content.substring(0, idxPhonetic).trim();
                content = content.substring(idxPhonetic + phonetic.length).trim();
            } else {
                const firstChinese = content.search(/[\u4e00-\u9fa5]/);
                if (firstChinese === -1) {
                    word = content;
                    content = '';
                } else {
                    word = content.substring(0, firstChinese).trim();
                    content = content.substring(firstChinese).trim();
                }
            }

            // 2. 从单词尾部提取词性
            const trailingPosMatch = word.match(/\s+(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)$/i);
            if (trailingPosMatch) {
                pos = trailingPosMatch[1];
                word = word.substring(0, trailingPosMatch.index).trim();
            }

            // 3. 从剩余内容开头提取词性
            if (!pos) {
                const posPattern = /^(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)/;
                const posMatch = content.match(posPattern);
                if (posMatch) {
                    pos = posMatch[1];
                    content = content.substring(pos.length).trim();
                } else {
                    const altPos = content.match(/^\s*([a-z]+\.)\s+/);
                    if (altPos && altPos[1].length <= 6) {
                        pos = altPos[1];
                        content = content.substring(pos.length).trim();
                    }
                }
            }

            // 4. 分离释义和例句
            if (content) {
                const sentences = content.match(/[A-Z][^。？！]*[.!?]/g);
                if (sentences && sentences.length > 0) {
                    const lastSentence = sentences[sentences.length - 1];
                    const idx = content.lastIndexOf(lastSentence);
                    if (idx > 0) {
                        meaning = content.substring(0, idx).trim();
                        example = content.substring(idx).trim();
                    } else {
                        example = content.trim();
                    }
                } else {
                    meaning = content.trim();
                }
            }

            word = word.replace(/\s+/g, ' ').trim();
            word = word.replace(/[;；,，.]$/, '').trim();

            // 5. 最终清理：处理 word 以词性开头或尾部残留词性
            const cleaned = sanitizeWord(word, pos);
            word = cleaned.word;
            pos = cleaned.pos;

            if (!word) return null;
            return { unit, word, phonetic, pos, meaning, example };
        }

        // ===================== 导入功能 =====================
        function doImport() {
            const bankId = document.getElementById('importBank').value;
            const text = document.getElementById('importText').value;
            if (!text.trim()) { showToast('请输入要导入的内容'); return; }

            const lines = text.split('\n');
            const bank = getBank(bankId);
            let success = 0, fail = 0, fails = [];

            lines.forEach((line, idx) => {
                const parsed = parseLine(line);
                if (parsed) {
                    const unitKey = 'unit' + parsed.unit;
                    if (!bank[unitKey]) bank[unitKey] = [];
                    // 用清理后的单词去重，覆盖旧脏数据
                    const cleanWord = sanitizeWord(parsed.word).word;
                    const existsIdx = bank[unitKey].findIndex(w => sanitizeWord(w.word).word === cleanWord);
                    if (existsIdx === -1) {
                        bank[unitKey].push(parsed);
                        success++;
                    } else {
                        bank[unitKey][existsIdx] = parsed;
                        success++;
                    }
                } else if (line.trim()) {
                    fail++;
                    if (fails.length < 5) fails.push(`第${idx+1}行: ${line.substring(0,30)}...`);
                }
            });

            saveBank(bankId, bank);
            document.getElementById('successCount').textContent = success;
            document.getElementById('failCount').textContent = fail;
            const failDiv = document.getElementById('failDetails');
            failDiv.innerHTML = fail > 0 ? ('失败行示例：<br>' + fails.join('<br>')) : '';
            document.getElementById('importResult').style.display = 'block';
            showToast(`导入完成！成功 ${success} 条，失败 ${fail} 条`);
        }

        let studyWords = [];

            // 强制清理所有旧选项状态（双重保险）

            options.forEach((opt) => {

        function generateOptions(correctWord, allWords) {
            const correct = { text: correctWord.meaning || correctWord.word, correct: true };
            const allBanks = getBanks();
            let globalPool = [];
            Object.values(allBanks).forEach(bank => {
                Object.values(bank).forEach(unitWords => {
                    if (Array.isArray(unitWords)) globalPool.push(...unitWords);
                });
            });
            const wrongPool = globalPool.filter(w => w.word !== correctWord.word && (w.meaning || w.word));
            let wrongs = [];
            if (wrongPool.length >= 3) {
                const shuffled = wrongPool.sort(() => Math.random() - 0.5).slice(0, 3);
                wrongs = shuffled.map(w => ({ text: w.meaning || w.word, correct: false }));
            } else if (wrongPool.length > 0) {
                const shuffled = wrongPool.sort(() => Math.random() - 0.5).slice(0, Math.min(3, wrongPool.length));
                wrongs = shuffled.map(w => ({ text: w.meaning || w.word, correct: false }));
                while (wrongs.length < 3) wrongs.push({ text: '（其他释义）', correct: false });
            } else {
                wrongs = [
                    { text: '（其他释义）', correct: false },
                    { text: '（其他释义）', correct: false },
                    { text: '（其他释义）', correct: false }
                ];
            }
            const all = [correct, ...wrongs];
            return all.sort(() => Math.random() - 0.5);
        }

        function selectOption(el, isCorrect) {

                document.getElementById('resultEmoji').textContent = '👍';
                document.getElementById('resultTitle').textContent = '表现不错！';
            } else {
                document.getElementById('resultEmoji').textContent = '💪';

            studyTimeoutId = setTimeout(() => {

        // ===================== 拼写测试 =====================
        let spellWords = [];
        let spellIndex = 0;
        let spellCorrect = 0;
        let spellWrong = 0;
        let currentSpellWord = null;
        let currentSpellBlank = null;

        function startSpellTest() {
            if (studyWords.length === 0) return;
            clearStudyTimers();
            initAudio();
            stopSpeech();
            spellWords = [...studyWords].sort(() => Math.random() - 0.5);
            spellIndex = 0;
            spellCorrect = 0;
            spellWrong = 0;
            document.getElementById('fsResult').classList.remove('active');
            document.getElementById('fsStudyBody').style.display = 'none';
            document.getElementById('fsSpellResult').classList.remove('active');
            document.getElementById('fsSpellBody').classList.add('active');
            showSpellQuestion();
        }

        function showSpellQuestion() {
            const q = spellWords[spellIndex];
            currentSpellWord = q;
            const total = spellWords.length;
            document.getElementById('fsProgressText').textContent = `拼写 ${spellIndex + 1} / ${total}`;
            document.getElementById('fsProgressFill').style.width = `${((spellIndex + 1) / total * 100)}%`;

            // 关键修复：用 sanitizeWord 确保拼写单词不含词性
            const spellWord = sanitizeWord(q.word).word;
            const blankInfo = generateBlank(spellWord);
            currentSpellBlank = blankInfo;

            let hintText = '';
            if (q.meaning) hintText += `<strong>释义：</strong>${q.meaning}`;
            const hintEl = document.getElementById('fsSpellHint');
            hintEl.innerHTML = hintText;
            hintEl.style.display = hintText ? 'block' : 'none';

            const displayPos = q.pos ? q.pos.replace(/\.$/, '') : '';
            const posEl = document.getElementById('fsSpellPos');
            posEl.textContent = displayPos;
            posEl.style.display = displayPos ? 'inline-block' : 'none';

            const container = document.getElementById('fsSpellWord');
            container.innerHTML = '';
            blankInfo.displayChars.forEach((item) => {
                const div = document.createElement('div');
                if (item.type === 'space') {
                    div.className = 'spell-char space-char';
                    div.textContent = '';
                } else if (item.type === 'shown') {
                    div.className = 'spell-char filled';
                    div.textContent = item.char;
                } else {
                    div.className = 'spell-char blank';
                    div.textContent = '';
                }
                container.appendChild(div);
            });

            speakOnlyWord(spellWord);

            const input = document.getElementById('fsSpellInput');
            input.value = '';
            input.className = 'spell-input';
            input.disabled = false;
            setTimeout(() => input.focus(), 100);
        }

        function generateBlank(word) {
            const chars = word.split('');
            const letterIndices = [];
            chars.forEach((c, i) => { if (/[a-zA-Z]/.test(c)) letterIndices.push(i); });
            const len = letterIndices.length;
            let hideCount = Math.max(1, Math.floor(len * 0.4));
            hideCount = Math.min(hideCount, len);
            if (len <= 2) hideCount = 1;
            const shuffled = [...letterIndices].sort(() => Math.random() - 0.5);
            const blankIndices = new Set(shuffled.slice(0, hideCount));
            const displayChars = chars.map((c, i) => {
                if (c === ' ') return { type: 'space', char: ' ' };
                else if (blankIndices.has(i)) return { type: 'blank', char: c };
                else return { type: 'shown', char: c };
            });
            return { fullWord: word, displayChars, blankIndices: Array.from(blankIndices) };
        }

        function handleSpellKey(e) {
            if (e.key === 'Enter') submitSpell();
        }

        function submitSpell() {
            const input = document.getElementById('fsSpellInput');
            const userAnswer = input.value.trim().toLowerCase();
            const correctAnswer = currentSpellBlank.fullWord.toLowerCase();
            if (!userAnswer) { showToast('请输入答案'); return; }
            input.disabled = true;

            if (userAnswer === correctAnswer) {
                spellCorrect++;
                playSound('correct');
                input.classList.add('correct');
                const container = document.getElementById('fsSpellWord');
                container.innerHTML = '';
                currentSpellBlank.fullWord.split('').forEach(char => {
                    const div = document.createElement('div');
                    if (char === ' ') div.className = 'spell-char space-char';
                    else { div.className = 'spell-char correct-reveal'; div.textContent = char; }
                    container.appendChild(div);
                });
                studyTimeoutId = setTimeout(() => nextSpell(), 1000);
            } else {
                spellWrong++;
                playSound('wrong');
                input.classList.add('wrong');
                const container = document.getElementById('fsSpellWord');
                container.innerHTML = '';
                currentSpellBlank.fullWord.split('').forEach((char, idx) => {
                    const div = document.createElement('div');
                    const wasBlank = currentSpellBlank.blankIndices.includes(idx);
                    if (char === ' ') div.className = 'spell-char space-char';
                    else if (wasBlank) { div.className = 'spell-char wrong-reveal'; div.textContent = char; }
                    else { div.className = 'spell-char correct-reveal'; div.textContent = char; }
                    container.appendChild(div);
                });
                studyTimeoutId = setTimeout(() => nextSpell(), 1800);
            }
        }

        function skipSpell() {
            spellWrong++;
            playSound('wrong');
            const input = document.getElementById('fsSpellInput');
            input.disabled = true;
            const container = document.getElementById('fsSpellWord');
            container.innerHTML = '';
            currentSpellBlank.fullWord.split('').forEach((char, idx) => {
                const div = document.createElement('div');
                const wasBlank = currentSpellBlank.blankIndices.includes(idx);
                if (char === ' ') div.className = 'spell-char space-char';
                else if (wasBlank) { div.className = 'spell-char wrong-reveal'; div.textContent = char; }
                else { div.className = 'spell-char correct-reveal'; div.textContent = char; }
                container.appendChild(div);
            });
            studyTimeoutId = setTimeout(() => nextSpell(), 1500);
        }

        function nextSpell() {
            spellIndex++;
            const input = document.getElementById('fsSpellInput');
            input.disabled = false;
            if (spellIndex < spellWords.length) showSpellQuestion();
            else finishSpellTest();
        }

        function finishSpellTest() {
            clearStudyTimers();
            stopSpeech();
            addCheckin();
            playSound('complete');
            document.getElementById('fsSpellBody').classList.remove('active');
            const result = document.getElementById('fsSpellResult');
            result.classList.add('active');

            const accuracy = total === 0 ? 0 : Math.round(spellCorrect / total * 100);
            document.getElementById('spellResultCorrect').textContent = spellCorrect;
            document.getElementById('spellResultWrong').textContent = spellWrong;
            document.getElementById('spellResultAccuracy').textContent = accuracy + '%';
            document.getElementById('spellResultSub').textContent = `本次拼写正确 ${spellCorrect} / ${total}`;
            if (accuracy >= 90) {
                document.getElementById('spellResultEmoji').textContent = '🏆';
                document.getElementById('spellResultTitle').textContent = '拼写完美！';
            } else if (accuracy >= 70) {
                document.getElementById('spellResultEmoji').textContent = '👍';
                document.getElementById('spellResultTitle').textContent = '拼写不错！';
            } else {
                document.getElementById('spellResultEmoji').textContent = '✍️';
                document.getElementById('spellResultTitle').textContent = '继续练习拼写！';
            }
            showToast('打卡完成！今日学习已记录');
        }

        // ===================== 打卡功能 =====================
        let checkinCalendarDate = new Date();

        function formatLocalDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function renderCheckinCalendar(records) {
            const grid = document.getElementById('checkinCalendarGrid');
            const title = document.getElementById('checkinCalendarTitle');
            if (!grid || !title) return;

            const y = checkinCalendarDate.getFullYear();
            const m = checkinCalendarDate.getMonth();
            title.textContent = `${y}年${m + 1}月打卡日历`;
            grid.innerHTML = '';

            const recordSet = new Set(records);
            const first = new Date(y, m, 1);
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const startDay = first.getDay();
            const todayKey = formatLocalDate(new Date());

            for (let i = 0; i < startDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day muted';
                empty.textContent = '0';
                grid.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(y, m, day);
                const key = formatLocalDate(d);
                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                if (recordSet.has(key)) cell.classList.add('checked');
                if (key === todayKey) cell.classList.add('today');
                cell.textContent = day;
                grid.appendChild(cell);
            }
        }

        function changeCheckinMonth(delta) {
            checkinCalendarDate = new Date(checkinCalendarDate.getFullYear(), checkinCalendarDate.getMonth() + delta, 1);
            renderCheckinCalendar(getCheckins());
        }

        function showCheckin() {
            const records = getCheckins();
            const total = records.length;
            document.getElementById('totalDays').textContent = total;
            checkinCalendarDate = new Date();
            renderCheckinCalendar(records);
            let listHtml = '';
            if (records.length === 0) {
                listHtml = '<div style="color:#b2bec3; text-align:center; padding:20px;">暂无打卡记录<br>完成一组学习即可打卡</div>';
            } else {
                const recent = records.slice(-10).reverse();
                recent.forEach(date => {
                    const d = new Date(date + 'T00:00:00');
                    const fmt = `${d.getMonth()+1}月${d.getDate()}日`;
                    listHtml += `<div style="padding:8px 0; border-bottom:1px solid #f0f0f0; display:flex; justify-content:space-between;">
                        <span>✅ 完成学习打卡</span>
                        <span style="color:#8898aa;">${fmt}</span>
                    </div>`;
                });
            }
            document.getElementById('checkinList').innerHTML = listHtml;
            document.getElementById('checkinModal').classList.add('active');
        }

        function drawRoundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        async function shareCheckinImage() {
            const records = getCheckins();
            const total = records.length;
            const y = checkinCalendarDate.getFullYear();
            const m = checkinCalendarDate.getMonth();
            const recordSet = new Set(records);
            const today = new Date();

            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1500;
            const ctx = canvas.getContext('2d');

            const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bg.addColorStop(0, '#ecfff7');
            bg.addColorStop(1, '#f7f8fb');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(32,201,151,0.16)';
            ctx.beginPath(); ctx.arc(160, 120, 220, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(960, 360, 180, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#18212f';
            ctx.font = '800 54px -apple-system, BlinkMacSystemFont, Arial';
            ctx.textAlign = 'center';
            ctx.fillText('万词斩 · 学习打卡', 540, 150);

            ctx.fillStyle = '#637083';
            ctx.font = '500 30px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText(`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`, 540, 202);

            drawRoundRect(ctx, 90, 260, 900, 260, 42);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(24,33,47,0.10)';
            ctx.shadowBlur = 28;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#20c997';
            ctx.font = '900 96px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText(String(total), 540, 395);
            ctx.fillStyle = '#637083';
            ctx.font = '600 32px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText('累计打卡天数', 540, 455);

            drawRoundRect(ctx, 90, 580, 900, 700, 42);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(24,33,47,0.08)';
            ctx.shadowBlur = 24;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#18212f';
            ctx.font = '800 40px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText(`${y}年${m + 1}月打卡日历`, 540, 650);

            const week = ['日','一','二','三','四','五','六'];
            ctx.font = '800 26px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillStyle = '#99a4b2';
            const startX = 175, startY = 720, cellW = 122, cellH = 82;
            week.forEach((w, i) => ctx.fillText(w, startX + i * cellW, startY));

            const first = new Date(y, m, 1);
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const startDay = first.getDay();
            ctx.font = '800 30px -apple-system, BlinkMacSystemFont, Arial';
            for (let day = 1; day <= daysInMonth; day++) {
                const idx = startDay + day - 1;
                const col = idx % 7;
                const row = Math.floor(idx / 7);
                const cx = startX + col * cellW;
                const cy = startY + 66 + row * cellH;
                const key = `${y}-${String(m + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                if (recordSet.has(key)) {
                    ctx.strokeStyle = '#f5365c';
                    ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.arc(cx, cy - 10, 32, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.fillStyle = key === formatLocalDate(today) ? '#087a55' : '#2d3436';
                ctx.fillText(String(day), cx, cy);
            }

            ctx.fillStyle = '#637083';
            ctx.font = '500 28px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText('坚持每天一点点，单词量慢慢涨起来', 540, 1360);
            ctx.fillStyle = '#20c997';
            ctx.font = '800 30px -apple-system, BlinkMacSystemFont, Arial';
            ctx.fillText('Keep going!', 540, 1410);

            canvas.toBlob(async (blob) => {
                if (!blob) { showToast('生成图片失败'); return; }
                const file = new File([blob], 'word-checkin.png', { type: 'image/png' });
                if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
                    try {
                        await navigator.share({ files: [file], title: '万词斩学习打卡', text: '今日学习打卡完成' });
                        return;
                    } catch (e) {
                        // 用户取消分享时走下载兜底
                    }
                }
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'word-checkin.png';
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 3000);
                showToast('已生成打卡图片；iPhone 可在分享菜单中保存到照片，或长按图片保存');
            }, 'image/png');
        }


        // ===================== 手机端拼写体验优化 v7：只输入缺失字母，也兼容输入完整单词 =====================
        function normalizeSpellText(text) {
            return (text || '').toLowerCase().replace(/[^a-z]/g, '');
        }

        function generateBlank(word) {
            const chars = word.split('');
            const letterIndices = [];
            chars.forEach((c, i) => { if (/[a-zA-Z]/.test(c)) letterIndices.push(i); });
            const len = letterIndices.length;

            let hideCount = Math.max(1, Math.round(len * 0.42));
            if (len <= 2) hideCount = 1;
            if (len >= 8) hideCount = Math.max(hideCount, 4);
            hideCount = Math.min(hideCount, len);

            // 尽量保留首字母，手机上更像提示式记忆；短词仍随机挖空。
            const candidateIndices = len >= 4 ? letterIndices.slice(1) : letterIndices;
            const shuffled = [...candidateIndices].sort(() => Math.random() - 0.5);
            let blanks = shuffled.slice(0, hideCount);
            if (blanks.length < hideCount) {
                blanks = blanks.concat(letterIndices.filter(i => !blanks.includes(i)).slice(0, hideCount - blanks.length));
            }
            blanks.sort((a, b) => a - b);
            const blankIndicesSet = new Set(blanks);

            const displayChars = chars.map((c, i) => {
                if (c === ' ') return { type: 'space', char: ' ' };
                else if (blankIndicesSet.has(i)) return { type: 'blank', char: c };
                else return { type: 'shown', char: c };
            });
            const blankLetters = blanks.map(i => chars[i]).join('');
            return { fullWord: word, displayChars, blankIndices: blanks, blankLetters };
        }

        function showSpellQuestion() {
            const q = spellWords[spellIndex];
            currentSpellWord = q;
            const total = spellWords.length;
            document.getElementById('fsProgressText').textContent = `拼写 ${spellIndex + 1} / ${total}`;
            document.getElementById('fsProgressFill').style.width = `${((spellIndex + 1) / total * 100)}%`;

            const spellWord = sanitizeWord(q.word).word;
            const blankInfo = generateBlank(spellWord);
            currentSpellBlank = blankInfo;

            let hintText = '';
            if (q.meaning) hintText += `<strong>释义：</strong>${q.meaning}`;
            const hintEl = document.getElementById('fsSpellHint');
            hintEl.innerHTML = hintText;
            hintEl.style.display = hintText ? 'block' : 'none';

            const displayPos = q.pos ? q.pos.replace(/\.$/, '') : '';
            const posEl = document.getElementById('fsSpellPos');
            posEl.textContent = displayPos;
            posEl.style.display = displayPos ? 'inline-block' : 'none';

            const container = document.getElementById('fsSpellWord');
            container.innerHTML = '';
            let blankNo = 0;
            blankInfo.displayChars.forEach((item, charIndex) => {
                const div = document.createElement('div');
                if (item.type === 'space') {
                    div.className = 'spell-char space-char';
                    div.textContent = '';
                } else if (item.type === 'shown') {
                    div.className = 'spell-char filled';
                    div.textContent = item.char;
                } else {
                    blankNo += 1;
                    div.className = 'spell-char blank';
                    div.dataset.blankOrder = String(blankNo - 1);
                    div.dataset.charIndex = String(charIndex);
                    div.innerHTML = `<span class="blank-index">${blankNo}</span>`;
                }
                container.appendChild(div);
            });

            speakOnlyWord(spellWord);

            const input = document.getElementById('fsSpellInput');
            input.value = '';
            input.className = 'spell-input';
            input.disabled = false;
            input.maxLength = Math.max(blankInfo.blankLetters.length, spellWord.length);
            input.placeholder = `输入 ${blankInfo.blankLetters.length} 个缺失字母`;
            input.setAttribute('aria-label', '输入挖空的缺失字母');

            let helper = document.getElementById('fsSpellHelper');
            if (!helper) {
                helper = document.createElement('div');
                helper.id = 'fsSpellHelper';
                helper.className = 'spell-helper';
                document.querySelector('.spell-input-area').insertBefore(helper, input);
            }
            helper.innerHTML = `按编号依次输入 <strong>${blankInfo.blankLetters.length}</strong> 个缺失字母；也可直接输入完整单词`;

            handleSpellInput();
            setTimeout(() => input.focus({ preventScroll: true }), 160);
        }

        function handleSpellInput() {
            if (!currentSpellBlank) return;
            const input = document.getElementById('fsSpellInput');
            const typed = normalizeSpellText(input.value);
            const blanks = document.querySelectorAll('#fsSpellWord .spell-char.blank');
            blanks.forEach((node, i) => {
                const existingBadge = node.querySelector('.blank-index');
                node.classList.toggle('typed', Boolean(typed[i]));
                node.classList.toggle('active-blank', i === Math.min(typed.length, blanks.length - 1));
                node.textContent = typed[i] || '';
                if (!typed[i] && existingBadge) node.appendChild(existingBadge);
                if (!typed[i] && !existingBadge) {
                    const badge = document.createElement('span');
                    badge.className = 'blank-index';
                    badge.textContent = String(i + 1);
                    node.appendChild(badge);
                }
            });
        }

        function submitSpell() {
            const input = document.getElementById('fsSpellInput');
            const rawAnswer = input.value.trim();
            const lettersOnly = normalizeSpellText(rawAnswer);
            const correctFull = normalizeSpellText(currentSpellBlank.fullWord);
            const correctMissing = normalizeSpellText(currentSpellBlank.blankLetters);
            if (!lettersOnly) { showToast('请输入缺失字母'); return; }

            const isCorrect = lettersOnly === correctMissing || lettersOnly === correctFull;
            input.disabled = true;

            if (isCorrect) {
                spellCorrect++;
                playSound('correct');
                input.classList.add('correct');
                revealSpellWord(true);
                studyTimeoutId = setTimeout(() => nextSpell(), 900);
            } else {
                spellWrong++;
                playSound('wrong');
                input.classList.add('wrong');
                revealSpellWord(false);
                showToast(`正确答案：${currentSpellBlank.fullWord}`);
                studyTimeoutId = setTimeout(() => nextSpell(), 1800);
            }
        }

        function revealSpellWord(isCorrect) {
            const container = document.getElementById('fsSpellWord');
            container.innerHTML = '';
            currentSpellBlank.fullWord.split('').forEach((char, idx) => {
                const div = document.createElement('div');
                const wasBlank = currentSpellBlank.blankIndices.includes(idx);
                if (char === ' ') {
                    div.className = 'spell-char space-char';
                } else if (isCorrect || !wasBlank) {
                    div.className = 'spell-char correct-reveal';
                    div.textContent = char;
                } else {
                    div.className = 'spell-char wrong-reveal';
                    div.textContent = char;
                }
                container.appendChild(div);
            });
        }

        function skipSpell() {
            spellWrong++;
            playSound('wrong');
            const input = document.getElementById('fsSpellInput');
            input.disabled = true;
            revealSpellWord(false);
            showToast(`正确答案：${currentSpellBlank.fullWord}`);
            studyTimeoutId = setTimeout(() => nextSpell(), 1500);
        }

        // 初始化
        updateUnitSelect();
        initSpeech();
    </script>
