<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万词斩-考Yan专用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f6fa;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px 40px; }

        /* 顶部标签 */
        .tabs {
            display: flex;
            background: #fff;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            border: none;
            background: none;
        }
        .tab.active {
            color: #5e72e4;
            font-weight: 700;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: #5e72e4;
            border-radius: 3px 3px 0 0;
        }

        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #5e72e4;
            border-radius: 2px;
        }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #636e72;
            margin-bottom: 6px;
        }
        select, textarea, input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 15px;
            background: #fafbfc;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #5e72e4;
            background: #fff;
        }
        textarea { resize: vertical; min-height: 200px; line-height: 1.8; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: #5e72e4;
            color: #fff;
            box-shadow: 0 4px 12px rgba(94,114,228,0.3);
        }
        .btn-primary:active { transform: translateY(1px); }
        .btn-success {
            background: #2dce89;
            color: #fff;
            box-shadow: 0 4px 12px rgba(45,206,137,0.3);
        }
        .btn-danger {
            background: #f5365c;
            color: #fff;
            box-shadow: 0 4px 12px rgba(245,54,92,0.3);
        }
        .btn-secondary {
            background: #8898aa;
            color: #fff;
        }
        .btn-block { width: 100%; margin-top: 12px; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn-group .btn { flex: 1; }

        .quantity-selector {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .quantity-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background: #fafbfc;
        }
        .quantity-option.selected {
            border-color: #5e72e4;
            background: #5e72e4;
            color: #fff;
        }

        .stats { display: flex; gap: 12px; margin-top: 16px; }
        .stat-box {
            flex: 1;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #2dce89;
        }
        .stat-number.fail { color: #f5365c; }
        .stat-label {
            font-size: 12px;
            color: #8898aa;
            margin-top: 4px;
        }

        /* ===== 全屏学习视图 ===== */
        .fullscreen-study {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f5f6fa;
            z-index: 200;
            flex-direction: column;
            overflow: hidden;
        }
        .fullscreen-study.active { display: flex; }

        .study-header {
            background: #fff;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2;
            position: relative;
        }
        .study-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-close-study {
            background: #f5f6fa;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            color: #636e72;
        }
        .study-progress-text {
            font-size: 14px;
            font-weight: 700;
            color: #5e72e4;
        }
        .study-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #e1e8ed;
        }
        .study-progress-fill {
            height: 100%;
            background: #5e72e4;
            transition: width 0.3s ease;
        }

        .study-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        .word-card {
            text-align: center;
            margin-bottom: 28px;
            animation: slideUp 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .word-main {
            font-size: 36px;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .word-phonetic {
            font-size: 18px;
            color: #8898aa;
            font-family: "Times New Roman", serif;
            margin-bottom: 8px;
        }
        .word-pos {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .word-example {
            margin-top: 16px;
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            max-width: 100%;
            padding: 12px 18px;
            background: #fff;
            border-radius: 12px;
            border-left: 4px solid #5e72e4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: left;
            font-style: italic;
        }
        .word-example:empty { display: none; }

        .btn-replay {
            margin-top: 14px;
            background: #fff;
            border: 2px solid #e1e8ed;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.2s;
            color: #5e72e4;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .btn-replay:hover {
            border-color: #5e72e4;
            background: #f5f7ff;
            transform: scale(1.08);
        }
        .btn-replay:active { transform: scale(0.95); }

        .options-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 20px;
        }
        .option {
            padding: 18px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 16px;
            cursor: pointer;
            font-size: 17px;
            transition: all 0.2s;
            background: #fff;
            text-align: left;
            position: relative;
            overflow: hidden;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .option:hover { border-color: #b0c4de; background: #f8f9ff; transform: translateY(-1px); }
        .option.correct {
            border-color: #2dce89;
            background: #e6f9f0;
            color: #1a7a4e;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(45,206,137,0.15);
        }
        .option.wrong {
            border-color: #f5365c;
            background: #ffe6ea;
            color: #c41e3a;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(245,54,92,0.15);
        }
        .option.disabled { pointer-events: none; }
        .option-marker {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            font-weight: 800;
        }

        /* ===== 拼写测试样式 ===== */
        .spell-body {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        .spell-body.active { display: flex; }
        .spell-card {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 100%;
        }
        .spell-hint {
            font-size: 18px;
            color: #636e72;
            margin-bottom: 16px;
            line-height: 1.6;
            padding: 12px 18px;
            background: #fff;
            border-radius: 12px;
            border-left: 4px solid #2dce89;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: left;
            width: 100%;
        }
        .spell-hint:empty { display: none; }
        .spell-pos-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .spell-word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 20px 0;
            min-height: 60px;
            align-items: center;
        }
        .spell-char {
            width: 40px;
            height: 52px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            background: #fff;
            transition: all 0.2s;
        }
        .spell-char.filled {
            border-color: #5e72e4;
            color: #5e72e4;
            background: #f5f7ff;
        }
        .spell-char.blank {
            border-color: #cbd5e0;
            border-style: dashed;
            background: #fafbfc;
            color: #8898aa;
        }
        .spell-char.space-char {
            border-color: transparent;
            background: transparent;
            width: 20px;
        }
        .spell-char.correct-reveal {
            border-color: #2dce89;
            color: #2dce89;
            background: #e6f9f0;
            animation: popIn 0.3s ease;
        }
        .spell-char.wrong-reveal {
            border-color: #f5365c;
            color: #f5365c;
            background: #ffe6ea;
            animation: shake 0.4s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .spell-input-area {
            width: 100%;
            max-width: 100%;
            margin-top: 8px;
        }
        .spell-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 14px;
            font-size: 20px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            background: #fff;
            transition: border-color 0.2s;
        }
        .spell-input:focus {
            outline: none;
            border-color: #5e72e4;
        }
        .spell-input.correct {
            border-color: #2dce89;
            background: #e6f9f0;
        }
        .spell-input.wrong {
            border-color: #f5365c;
            background: #ffe6ea;
        }
        .spell-btn-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            width: 100%;
            max-width: 100%;
        }
        .spell-btn-row .btn { flex: 1; }

        /* 拼写结果页 */
        .spell-result {
            display: none;
            overflow-y: auto;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.5s;
        }
        .spell-result.active { display: flex; }

        /* 结果页（全屏内） */
        .result-fullscreen {
            display: none;
            overflow-y: auto;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.5s;
        }
        .result-fullscreen.active { display: flex; }
        .result-emoji { font-size: 72px; margin-bottom: 20px; }
        .result-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: #2d3436; }
        .result-sub { color: #8898aa; margin-bottom: 28px; font-size: 16px; }
        .result-stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            width: 100%;
            max-width: 100%;
        }
        .result-stat {
            flex: 1;
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .result-stat-num {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .result-stat-label { font-size: 12px; color: #8898aa; }
        .result-actions {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 100%;
        }
        .result-actions .btn { flex: 1; }

        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 20px;
            width: 100%;
            max-width: 100%;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: modalIn 0.3s;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            padding: 20px 20px 0;
            font-size: 18px;
            font-weight: 800;
        }
        .modal-body {
            padding: 16px 20px;
            overflow-y: auto;
            max-height: 50vh;
            font-size: 14px;
            line-height: 1.8;
        }
        .modal-footer {
            padding: 12px 20px 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-footer .btn { padding: 10px 20px; }

        .word-list-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .word-list-item:last-child { border-bottom: none; }
        .word-list-term {
            font-weight: 700;
            color: #2d3436;
            font-size: 15px;
        }
        .word-list-meta {
            color: #8898aa;
            font-size: 12px;
            margin-top: 2px;
        }
        .word-list-meaning {
            color: #636e72;
            margin-top: 4px;
        }
        .unit-header {
            background: #f8f9fa;
            padding: 8px 12px;
            font-weight: 700;
            color: #5e72e4;
            font-size: 14px;
            border-radius: 8px;
            margin: 8px 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #b2bec3;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .tag-blue { background: #e3f2fd; color: #1976d2; }
        .tag-green { background: #e6f9f0; color: #1a7a4e; }

        .checkin-summary {
            text-align: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .checkin-summary-number {
            font-size: 36px;
            font-weight: 800;
            color: #5e72e4;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #2d3436;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="tabs">
        <button class="tab active" onclick="switchTab(this, 'import')">导入单词</button>
        <button class="tab" onclick="switchTab(this, 'study')">开始记忆</button>
    </div>

    <div class="container">
        <!-- 导入页面 -->
        <div id="page-import" class="page active">
            <div class="card">
                <div class="card-title">选择词库</div>
                <div class="form-group">
                    <label class="form-label">目标词库</label>
                    <select id="importBank">
                        <option value="7a">七年级上册</option>
                        <option value="7b" selected>七年级下册</option>
                        <option value="8a">八年级上册</option>
                        <option value="8b">八年级下册</option>
                        <option value="9a">九年级上册</option>
                        <option value="9b">九年级下册</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-title">粘贴单词内容</div>
                <div class="form-group">
                    <label class="form-label">支持格式：【单元X】单词 /音标/ 词性 释义 例句</label>
                    <textarea id="importText" placeholder="请粘贴单词内容，例如：
【单元1】advice /əd'vaɪs/ n. 建议 Can you give me some advice?
【单元1】give up 认输；放弃 Never give up when you face difficulties."></textarea>
                </div>
                <button class="btn btn-primary btn-block" onclick="doImport()">执行导入</button>

                <div id="importResult" style="display:none; margin-top:16px;">
                    <div class="stats">
                        <div class="stat-box">
                            <div class="stat-number" id="successCount">0</div>
                            <div class="stat-label">导入成功</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number fail" id="failCount">0</div>
                            <div class="stat-label">导入失败</div>
                        </div>
                    </div>
                    <div id="failDetails" style="margin-top:12px; font-size:13px; color:#f5365c;"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">词库管理</div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="viewBank()">查看已导入内容</button>
                    <button class="btn btn-danger" onclick="confirmClear()">清空词库</button>
                </div>
            </div>
        </div>

        <!-- 记忆页面（设置区） -->
        <div id="page-study" class="page">
            <div class="card" id="studySetupCard">
                <div class="card-title">学习设置</div>
                <div class="form-group">
                    <label class="form-label">选择词库</label>
                    <select id="studyBank" onchange="updateUnitSelect()">
                        <option value="7a">七年级上册</option>
                        <option value="7b" selected>七年级下册</option>
                        <option value="8a">八年级上册</option>
                        <option value="8b">八年级下册</option>
                        <option value="9a">九年级上册</option>
                        <option value="9b">九年级下册</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">选择单元</label>
                    <select id="studyUnit">
                        <option value="all">全部单元</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">本次记忆数量</label>
                    <div class="quantity-selector">
                        <div class="quantity-option" data-value="1" onclick="selectQuantity(this)">1</div>
                        <div class="quantity-option selected" data-value="50" onclick="selectQuantity(this)">50</div>

    <script>
        // ===================== 数据层 =====================
        const DB_KEY = 'wordBanks_v1';
        const CHECKIN_KEY = 'checkinRecords_v1';

        const bankNames = {
            '7a': '七年级上册', '7b': '七年级下册',
            '8a': '八年级上册', '8b': '八年级下册',
            '9a': '九年级上册', '9b': '九年级下册'
        };

        function getBanks() {
            const raw = localStorage.getItem(DB_KEY);
            return raw ? JSON.parse(raw) : {};
        }
        function saveBanks(banks) {
            localStorage.setItem(DB_KEY, JSON.stringify(banks));
        }
        function getBank(bankId) {
            const banks = getBanks();
            return banks[bankId] || {};
        }
        function saveBank(bankId, data) {
            const banks = getBanks();
            banks[bankId] = data;
            saveBanks(banks);
        }
        function getCheckins() {
            const raw = localStorage.getItem(CHECKIN_KEY);
            return raw ? JSON.parse(raw) : [];
        }
        function addCheckin() {
            const today = new Date().toISOString().split('T')[0];
            const records = getCheckins();
            if (!records.includes(today)) {
                records.push(today);
                records.sort();
                localStorage.setItem(CHECKIN_KEY, JSON.stringify(records));
            }
        }

        // ===================== 音效系统（Web Audio API） =====================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    osc.start(now + i * 0.08);
                    gain.gain.setValueAtTime(0.25, now + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.35);
                    osc.stop(now + i * 0.08 + 0.35);
                });
            } else if (type === 'wrong') {
                [220.00, 174.61].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    osc.start(now + i * 0.12);
                    gain.gain.setValueAtTime(0.25, now + i * 0.12);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.3);
                    osc.stop(now + i * 0.12 + 0.3);
                });
            } else if (type === 'complete') {
                [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    osc.start(now + i * 0.09);
                    gain.gain.setValueAtTime(0.22, now + i * 0.09);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.09 + 0.5);
                    osc.stop(now + i * 0.09 + 0.5);
                });
                const chordOsc = audioCtx.createOscillator();
                const chordGain = audioCtx.createGain();
                chordOsc.connect(chordGain);
                chordGain.connect(audioCtx.destination);
                chordOsc.type = 'sine';
                chordOsc.frequency.value = 523.25;
                chordOsc.start(now);
                chordGain.gain.setValueAtTime(0.12, now);
                chordGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                chordOsc.stop(now + 1.2);
            }
        }

        // ===================== 语音系统（SpeechSynthesis） =====================
        let speechSynth = window.speechSynthesis || null;
        let currentVoice = null;

        function initSpeech() {
            if (!speechSynth) return;
            const voices = speechSynth.getVoices();
            currentVoice = voices.find(v => v.lang && v.lang.startsWith('en')) || voices[0];
        }

        if (speechSynth && speechSynth.onvoiceschanged !== undefined) {
            speechSynth.onvoiceschanged = initSpeech;
        }
        initSpeech();

        function stopSpeech() {
            if (speechSynth) speechSynth.cancel();
        }

        function cleanTextForSpeech(text) {
            if (!text) return '';
            return text
                .replace(/\s*\b(n\.?|v\.?|adj\.?|adv\.?|prep\.?|conj\.?|pron\.?|det\.?|art\.?|num\.?|int\.?|abbr\.?|phr\.?|aux\.?|modal\.?|vi\.?|vt\.?|link-v\.?)\b\s*/gi, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function speakWordAndExample(word, example) {
            if (!speechSynth || !word) return;
            speechSynth.cancel();

            const cleanWord = cleanTextForSpeech(word);
            const cleanExample = cleanTextForSpeech(example);

            const u1 = new SpeechSynthesisUtterance(cleanWord);
            u1.lang = 'en-US';
            u1.rate = 0.85;
            u1.pitch = 1.0;
            if (currentVoice) u1.voice = currentVoice;

            const u2 = cleanExample ? new SpeechSynthesisUtterance(cleanExample) : null;
            if (u2) {
                u2.lang = 'en-US';
                u2.rate = 0.82;
                u2.pitch = 1.0;
                if (currentVoice) u2.voice = currentVoice;
            }

            u1.onend = () => {
                if (u2) speechSynth.speak(u2);
            };

            speechSynth.speak(u1);
        }

        // 仅朗读单词（拼写测试用）
        function speakOnlyWord(word) {
            if (!speechSynth || !word) return;
            speechSynth.cancel();
            const cleanWord = cleanTextForSpeech(word);
            const u = new SpeechSynthesisUtterance(cleanWord);
            u.lang = 'en-US';
            u.rate = 0.85;
            u.pitch = 1.0;
            if (currentVoice) u.voice = currentVoice;
            speechSynth.speak(u);
        }

        function replayAudio() {
            if (currentIndex < studyWords.length) {
                const q = studyWords[currentIndex];
                speakWordAndExample(q.word, q.example);
            }
        }

        // ===================== 解析器 =====================
        function parseLine(line) {
            line = line.trim();
            if (!line) return null;

            const unitMatch = line.match(/【单元\s*(\d+)】/);
            if (!unitMatch) return null;
            const unit = parseInt(unitMatch[1]);

            let content = line.replace(/【单元\s*\d+】/, '').trim();
            if (!content) return null;

            let word = '';
            let phonetic = '';
            let pos = '';
            let meaning = '';
            let example = '';

            const phoneticMatch = content.match(/(\/[^\/]+\/)/);
            if (phoneticMatch) {
                phonetic = phoneticMatch[1];
                const idxPhonetic = content.indexOf(phonetic);
                word = content.substring(0, idxPhonetic).trim();
                content = content.substring(idxPhonetic + phonetic.length).trim();
            } else {
                const firstChinese = content.search(/[\u4e00-\u9fa5]/);
                if (firstChinese === -1) {
                    word = content;
                    content = '';
                } else {
                    word = content.substring(0, firstChinese).trim();
                    content = content.substring(firstChinese).trim();

                    const trailingPosMatch = word.match(/\s+(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)$/i);
                    if (trailingPosMatch) {
                        pos = trailingPosMatch[1];
                        word = word.substring(0, trailingPosMatch.index).trim();
                    }
                }
            }

            if (!pos) {
                const posPattern = /^(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)/;
                const posMatch = content.match(posPattern);
                if (posMatch) {
                    pos = posMatch[1];
                    content = content.substring(pos.length).trim();
                } else {
                    const altPos = content.match(/^\s*([a-z]+\.)\s+/);
                    if (altPos && altPos[1].length <= 6) {
                        pos = altPos[1];
                        content = content.substring(pos.length).trim();
                    }
                }
            }

            if (content) {
                const sentences = content.match(/[A-Z][^。？！]*[.!?]/g);
                if (sentences && sentences.length > 0) {
                    const lastSentence = sentences[sentences.length - 1];
                    const idx = content.lastIndexOf(lastSentence);
                    if (idx > 0) {
                        meaning = content.substring(0, idx).trim();
                        example = content.substring(idx).trim();
                    } else {
                        example = content.trim();
                    }
                } else {
                    meaning = content.trim();
                }
            }

            word = word.replace(/\s+/g, ' ').trim();
            word = word.replace(/[;；,，.]$/, '').trim();

            // 最终清理：确保 word 不含词性
            const cleaned = sanitizeWord(word, pos);
            word = cleaned.word;
            pos = cleaned.pos;

            if (!word) return null;
            return { unit, word, phonetic, pos, meaning, example };
        }
        // ===================== 单词清理：剥离尾部/头部词性 =====================
        function sanitizeWord(word, extractedPos) {
            if (!word) return { word: '', pos: extractedPos || '' };
            let cleaned = word.trim();
            let pos = extractedPos || '';

            // 情况1：word 以词性标记开头，如 "adj. + enough to do sth"
            const leadingPosMatch = cleaned.match(/^(n\.|v\.|adj\.|adv\.|prep\.|conj\.|pron\.|det\.|art\.|num\.|int\.|abbr\.|phr\.|aux\.|modal\.|vi\.|vt\.|link-v\.)\s*(.+)$/i);
            if (leadingPosMatch) {
                pos = pos || leadingPosMatch[1];
                cleaned = leadingPosMatch[2].trim();
            }

            // 情况2：word 尾部有词性标记
            const posList = [
                'n.', 'v.', 'adj.', 'adv.', 'prep.', 'conj.', 'pron.', 'det.', 'art.', 'num.', 'int.', 'abbr.', 'phr.', 'aux.', 'modal.', 'vi.', 'vt.', 'link-v.',
                'n', 'v', 'adj', 'adv', 'prep', 'conj', 'pron', 'det', 'art', 'num', 'int', 'abbr', 'phr', 'aux', 'modal', 'vi', 'vt', 'link-v'
            ];
            for (const p of posList) {
                const esc = p.replace(/\./g, '\\.');
                const re = new RegExp('\\s+' + esc + '\\s*$', 'i');
                if (re.test(cleaned)) {
                    cleaned = cleaned.replace(re, '').trim();
                    if (!pos) pos = p.endsWith('.') ? p : p + '.';
                    break;
                }
            }

            // 清理尾部标点
            cleaned = cleaned.replace(/[;；,，.\-]+$/, '').trim();
            return { word: cleaned, pos: pos };
        }


        // ===================== UI 交互 =====================
        function switchTab(el, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('page-' + tab).classList.add('active');
            if (tab === 'study') updateUnitSelect();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function selectQuantity(el) {
            document.querySelectorAll('.quantity-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function getSelectedQuantity() {
            return parseInt(document.querySelector('.quantity-option.selected').dataset.value);
        }

        // ===================== 导入功能 =====================
        function doImport() {
            const bankId = document.getElementById('importBank').value;
            const text = document.getElementById('importText').value;
            if (!text.trim()) {
                showToast('请输入要导入的内容');
                return;
            }

            const lines = text.split('\n');
            const bank = getBank(bankId);
            let success = 0, fail = 0, fails = [];

            lines.forEach((line, idx) => {
                const parsed = parseLine(line);
                if (parsed) {
                    const unitKey = 'unit' + parsed.unit;
                    if (!bank[unitKey]) bank[unitKey] = [];
                    const cleanWord = sanitizeWord(parsed.word).word;
                    const existsIdx = bank[unitKey].findIndex(w => sanitizeWord(w.word).word === cleanWord);
                    if (existsIdx === -1) {
                        bank[unitKey].push(parsed);
                        success++;
                    } else {
                        bank[unitKey][existsIdx] = parsed;
                        success++;
                    }
                } else if (line.trim()) {
                    fail++;
                    if (fails.length < 5) fails.push(`第${idx+1}行: ${line.substring(0,30)}...`);
                }
            });

            saveBank(bankId, bank);

            document.getElementById('successCount').textContent = success;
            document.getElementById('failCount').textContent = fail;
            const failDiv = document.getElementById('failDetails');
            failDiv.innerHTML = fail > 0 ? ('失败行示例：<br>' + fails.join('<br>')) : '';
            document.getElementById('importResult').style.display = 'block';

            showToast(`导入完成！成功 ${success} 条，失败 ${fail} 条`);
        }

        function viewBank() {
            const bankId = document.getElementById('importBank').value;
            const bank = getBank(bankId);
            const units = Object.keys(bank).sort();

            let html = '';
            if (units.length === 0) {
                html = '<div class="empty-state"><div class="empty-state-icon">📭</div>该词库暂无内容</div>';
            } else {
                let total = 0;
                units.forEach(u => {
                    const words = bank[u];
                    if (words.length === 0) return;
                    total += words.length;
                    const unitNum = u.replace('unit', '');
                    html += `<div class="unit-header">单元 ${unitNum} <span class="tag tag-blue">${words.length} 词</span></div>`;
                    words.forEach(w => {
                        const displayPos = w.pos ? w.pos.replace(/\.$/, '') : '';
                        html += `<div class="word-list-item">
                            <div class="word-list-term">${w.word} <span style="color:#8898aa; font-weight:400;">${w.phonetic}</span> <span class="tag tag-green">${displayPos}</span></div>
                            <div class="word-list-meaning">${w.meaning}</div>
                            ${w.example ? `<div class="word-list-meta" style="margin-top:4px; font-style:italic;">${w.example}</div>` : ''}
                        </div>`;
                    });
                });
                if (total === 0) {
                    html = '<div class="empty-state"><div class="empty-state-icon">📭</div>该词库暂无内容</div>';
                } else {
                    html = `<div style="margin-bottom:12px; font-size:13px; color:#8898aa;">词库：${bankNames[bankId]} · 共 ${total} 个单词</div>` + html;
                }
            }

            document.getElementById('viewModalTitle').textContent = '已导入内容 - ' + bankNames[bankId];
            document.getElementById('viewModalBody').innerHTML = html;
            document.getElementById('viewModal').classList.add('active');
        }

        function confirmClear() {
            const bankId = document.getElementById('importBank').value;
            document.getElementById('clearTarget').textContent = bankNames[bankId];
            document.getElementById('clearModal').classList.add('active');
        }

        function doClear() {
            const bankId = document.getElementById('importBank').value;

            closeModal('clearModal');
            showToast('词库已清空');
            document.getElementById('importResult').style.display = 'none';

        // ===================== 学习功能（全屏） =====================
        function updateUnitSelect() {
            const bankId = document.getElementById('studyBank').value;
            const bank = getBank(bankId);
            const units = Object.keys(bank).filter(k => bank[k].length > 0).sort();
            const select = document.getElementById('studyUnit');
            select.innerHTML = '<option value="all">全部单元</option>';
            units.forEach(u => {
                const num = u.replace('unit', '');
                select.innerHTML += `<option value="${u}">单元 ${num} (${bank[u].length}词)</option>`;
            });
        }

        let studyWords = [];
        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;

        // ===================== 全局定时器追踪 =====================
        let studyTimeoutId = null;
        function clearStudyTimers() {
            if (studyTimeoutId) { clearTimeout(studyTimeoutId); studyTimeoutId = null; }
        }

        // ===================== 学习功能（全屏） =====================
        function startStudy() {
            clearStudyTimers();
            initAudio();
            if (speechSynth && speechSynth.paused) {
                speechSynth.resume();
            }
            initSpeech();

            const bankId = document.getElementById('studyBank').value;
            const unit = document.getElementById('studyUnit').value;
            const quantity = getSelectedQuantity();
            const bank = getBank(bankId);

            let pool = [];
            if (unit === 'all') {
                Object.values(bank).forEach(arr => pool.push(...arr));
            } else {
                pool = bank[unit] || [];
            }

            if (pool.length === 0) {
                showToast('该词库/单元暂无单词，请先导入');
                return;
            }

            pool = pool.sort(() => Math.random() - 0.5);
            studyWords = pool.slice(0, Math.min(quantity, pool.length));
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;

            document.getElementById('fullscreenStudy').classList.add('active');
            document.getElementById('fsResult').classList.remove('active');
            document.getElementById('fsSpellBody').classList.remove('active');
            document.getElementById('fsSpellResult').classList.remove('active');
            document.getElementById('fsStudyBody').style.display = 'flex';
            document.getElementById('fsBankName').textContent = bankNames[bankId];

            showQuestion();
        }

        function exitStudy() {
            clearStudyTimers();
            stopSpeech();
            document.getElementById('fullscreenStudy').classList.remove('active');
            document.getElementById('fsResult').classList.remove('active');
            document.getElementById('fsSpellBody').classList.remove('active');
            document.getElementById('fsSpellResult').classList.remove('active');
            document.getElementById('fsStudyBody').style.display = 'flex';
        }

        function showQuestion() {
            const q = studyWords[currentIndex];
            const total = studyWords.length;

            document.getElementById('fsProgressText').textContent = `${currentIndex + 1} / ${total}`;
            document.getElementById('fsProgressFill').style.width = `${((currentIndex + 1) / total * 100)}%`;

            const card = document.getElementById('fsWordCard');
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = 'slideUp 0.4s ease';

            document.getElementById('fsWordMain').textContent = q.word;
            document.getElementById('fsWordPhonetic').textContent = q.phonetic || '';
            document.getElementById('fsWordPhonetic').style.display = q.phonetic ? 'block' : 'none';

            const displayPos = q.pos ? q.pos.replace(/\.$/, '') : '';
            document.getElementById('fsWordPos').textContent = displayPos;
            document.getElementById('fsWordPos').style.display = displayPos ? 'inline-block' : 'none';

            const exEl = document.getElementById('fsWordExample');
            if (q.example) {
                exEl.textContent = q.example;
                exEl.style.display = 'block';
            } else {
                exEl.textContent = '';
                exEl.style.display = 'none';
            }

            speakWordAndExample(q.word, q.example);

            const options = generateOptions(q, studyWords);
            const container = document.getElementById('fsOptions');
            container.innerHTML = '';

            options.forEach((opt) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt.text;
                div.dataset.correct = opt.correct;
                div.onclick = () => selectOption(div, opt.correct);
                container.appendChild(div);
            });
        }

        function generateOptions(correctWord, allWords) {
            const correct = { text: correctWord.meaning || correctWord.word, correct: true };
            const others = allWords.filter(w => w.word !== correctWord.word);
            const wrongPool = others.length >= 3 ? others : allWords.filter(w => w.word !== correctWord.word);

            let wrongs = [];
            if (wrongPool.length >= 3) {
                const shuffled = wrongPool.sort(() => Math.random() - 0.5).slice(0, 3);
                wrongs = shuffled.map(w => ({ text: w.meaning || w.word, correct: false }));
            } else {
                wrongs = [
                    { text: '（干扰项）其他含义', correct: false },
                    { text: '（干扰项）相似表达', correct: false },
                    { text: '（干扰项）近义混淆', correct: false }
                ];
            }

            const all = [correct, ...wrongs];
            return all.sort(() => Math.random() - 0.5);
        }

        function selectOption(el, isCorrect) {
            const options = document.querySelectorAll('#fsOptions .option');
            options.forEach(o => o.classList.add('disabled'));

            if (isCorrect) {
                el.classList.add('correct');
                el.innerHTML += '<span class="option-marker">✓</span>';
                correctCount++;
                playSound('correct');
            } else {
                el.classList.add('wrong');
                el.innerHTML += '<span class="option-marker">✗</span>';
                wrongCount++;
                playSound('wrong');
                options.forEach(o => {
                    if (o.dataset.correct === 'true') {
                        o.classList.add('correct');
                        if (!o.querySelector('.option-marker')) {
                            o.innerHTML += '<span class="option-marker">✓</span>';
                        }
                    }
                });
            }

            studyTimeoutId = setTimeout(() => {
                currentIndex++;
                if (currentIndex < studyWords.length) {
                    showQuestion();
                } else {
                    finishStudy();
                }
            }, 1300);
        }

        // 选择题完成 → 短暂显示结果 → 自动进入拼写（不打卡）
        function finishStudy() {
            stopSpeech();
            playSound('complete');

            document.getElementById('fsStudyBody').style.display = 'none';
            const result = document.getElementById('fsResult');
            result.classList.add('active');

            const total = studyWords.length;
            const accuracy = total === 0 ? 0 : Math.round(correctCount / total * 100);

            document.getElementById('resultCorrect').textContent = correctCount;
            document.getElementById('resultWrong').textContent = wrongCount;
            document.getElementById('resultAccuracy').textContent = accuracy + '%';
            document.getElementById('resultSub').textContent = `本次答对 ${correctCount} / ${total}`;

            if (accuracy >= 90) {
                document.getElementById('resultEmoji').textContent = '🏆';
                document.getElementById('resultTitle').textContent = '太棒了！';
            } else if (accuracy >= 70) {
                document.getElementById('resultEmoji').textContent = '👍';
                document.getElementById('resultTitle').textContent = '表现不错！';
            } else {
                document.getElementById('resultEmoji').textContent = '💪';
                document.getElementById('resultTitle').textContent = '继续加油！';
            }

            studyTimeoutId = setTimeout(() => {
                document.getElementById('fsResult').classList.remove('active');
                startSpellTest();
            }, 2000);
        }

        // ===================== 拼写测试功能 =====================
        let spellWords = [];
        let spellIndex = 0;
        let spellCorrect = 0;
        let spellWrong = 0;
        let currentSpellWord = null;
        let currentSpellBlank = null;

        function startSpellTest() {
            if (studyWords.length === 0) return;
            clearStudyTimers();
            initAudio();
            stopSpeech();

            spellWords = [...studyWords].sort(() => Math.random() - 0.5);
            spellIndex = 0;
            spellCorrect = 0;
            spellWrong = 0;

            document.getElementById('fsResult').classList.remove('active');
            document.getElementById('fsStudyBody').style.display = 'none';
            document.getElementById('fsSpellResult').classList.remove('active');

            const spellBody = document.getElementById('fsSpellBody');
            spellBody.classList.add('active');

            showSpellQuestion();
        }

        function showSpellQuestion() {
            const q = spellWords[spellIndex];
            currentSpellWord = q;
            const total = spellWords.length;

            document.getElementById('fsProgressText').textContent = `拼写 ${spellIndex + 1} / ${total}`;
            document.getElementById('fsProgressFill').style.width = `${((spellIndex + 1) / total * 100)}%`;

            // 关键修复：用 sanitizeWord 确保拼写单词不含词性
            const spellWord = sanitizeWord(q.word).word;
            const blankInfo = generateBlank(spellWord);
            currentSpellBlank = blankInfo;

            // 只显示中文释义
            let hintText = '';
            if (q.meaning) hintText += `<strong>释义：</strong>${q.meaning}`;
            document.getElementById('fsSpellHint').innerHTML = hintText;

            // 显示词性标签（不参与挖空）
            const displayPos = q.pos ? q.pos.replace(/\.$/, '') : '';
            const posEl = document.getElementById('fsSpellPos');
            posEl.textContent = displayPos;
            posEl.style.display = displayPos ? 'inline-block' : 'none';

            // 渲染单词框（仅单词/词组字母挖空，词性不进入）
            const container = document.getElementById('fsSpellWord');
            container.innerHTML = '';
            blankInfo.displayChars.forEach((item) => {
                const div = document.createElement('div');
                if (item.type === 'space') {
                    div.className = 'spell-char space-char';
                    div.textContent = '';
                } else if (item.type === 'shown') {
                    div.className = 'spell-char filled';
                    div.textContent = item.char;
                } else {
                    div.className = 'spell-char blank';
                    div.textContent = '';
                }
                container.appendChild(div);
            });

            // 朗读完整单词
            speakOnlyWord(spellWord);

            // 清空输入框并聚焦
            const input = document.getElementById('fsSpellInput');
            input.value = '';
            input.className = 'spell-input';
            input.disabled = false;
            setTimeout(() => input.focus(), 100);
        }

        // 生成挖空：仅对单词/词组的字母挖空，词性完全不参与
        function generateBlank(word) {
            const chars = word.split('');
            // 只找出字母位置（可挖空）
            const letterIndices = [];
            chars.forEach((c, i) => {
                if (/[a-zA-Z]/.test(c)) letterIndices.push(i);
            });

            const len = letterIndices.length;
            let hideCount = Math.max(1, Math.floor(len * 0.4));
            hideCount = Math.min(hideCount, len);
            if (len <= 2) hideCount = 1;

            const shuffled = [...letterIndices].sort(() => Math.random() - 0.5);
            const blankIndices = new Set(shuffled.slice(0, hideCount));

            const displayChars = chars.map((c, i) => {
                if (c === ' ') {
                    return { type: 'space', char: ' ' };
                } else if (blankIndices.has(i)) {
                    return { type: 'blank', char: c };
                } else {
                    return { type: 'shown', char: c };
                }
            });

            return { fullWord: word, displayChars, blankIndices: Array.from(blankIndices) };
        }

        function handleSpellKey(e) {
            if (e.key === 'Enter') {
                submitSpell();
            }
        }

        function submitSpell() {
            const input = document.getElementById('fsSpellInput');
            const userAnswer = input.value.trim().toLowerCase();
            const correctAnswer = currentSpellBlank.fullWord.toLowerCase();

            if (!userAnswer) {
                showToast('请输入答案');
                return;
            }

            input.disabled = true;

            if (userAnswer === correctAnswer) {
                spellCorrect++;
                playSound('correct');
                input.classList.add('correct');

                const container = document.getElementById('fsSpellWord');
                container.innerHTML = '';
                currentSpellBlank.fullWord.split('').forEach(char => {
                    const div = document.createElement('div');
                    if (char === ' ') {
                        div.className = 'spell-char space-char';
                    } else {
                        div.className = 'spell-char correct-reveal';
                        div.textContent = char;
                    }
                    container.appendChild(div);
                });

                studyTimeoutId = setTimeout(() => nextSpell(), 1000);
            } else {
                spellWrong++;
                playSound('wrong');
                input.classList.add('wrong');

                const container = document.getElementById('fsSpellWord');
                container.innerHTML = '';
                currentSpellBlank.fullWord.split('').forEach((char, idx) => {
                    const div = document.createElement('div');
                    const wasBlank = currentSpellBlank.blankIndices.includes(idx);
                    if (char === ' ') {
                        div.className = 'spell-char space-char';
                    } else if (wasBlank) {
                        div.className = 'spell-char wrong-reveal';
                        div.textContent = char;
                    } else {
                        div.className = 'spell-char correct-reveal';
                        div.textContent = char;
                    }
                    container.appendChild(div);
                });

                studyTimeoutId = setTimeout(() => nextSpell(), 1800);
            }
        }

        function skipSpell() {
            spellWrong++;
            playSound('wrong');

            const input = document.getElementById('fsSpellInput');
            input.disabled = true;

            const container = document.getElementById('fsSpellWord');
            container.innerHTML = '';
            currentSpellBlank.fullWord.split('').forEach((char, idx) => {
                const div = document.createElement('div');
                const wasBlank = currentSpellBlank.blankIndices.includes(idx);
                if (char === ' ') {
                    div.className = 'spell-char space-char';
                } else if (wasBlank) {
                    div.className = 'spell-char wrong-reveal';
                    div.textContent = char;
                } else {
                    div.className = 'spell-char correct-reveal';
                    div.textContent = char;
                }
                container.appendChild(div);
            });

            studyTimeoutId = setTimeout(() => nextSpell(), 1500);
        }

        function nextSpell() {
            spellIndex++;
            const input = document.getElementById('fsSpellInput');
            input.disabled = false;

            if (spellIndex < spellWords.length) {
                showSpellQuestion();
            } else {
                finishSpellTest();
            }
        }

        // 拼写完成 → 打卡 → 显示结果
        function finishSpellTest() {
            clearStudyTimers();
            stopSpeech();
            addCheckin(); // 拼写完成后才打卡
            playSound('complete');

            document.getElementById('fsSpellBody').classList.remove('active');
            const result = document.getElementById('fsSpellResult');
            result.classList.add('active');

            const total = spellWords.length;
            const accuracy = total === 0 ? 0 : Math.round(spellCorrect / total * 100);

            document.getElementById('spellResultCorrect').textContent = spellCorrect;
            document.getElementById('spellResultWrong').textContent = spellWrong;
            document.getElementById('spellResultAccuracy').textContent = accuracy + '%';
            document.getElementById('spellResultSub').textContent = `本次拼写正确 ${spellCorrect} / ${total}`;

            if (accuracy >= 90) {
                document.getElementById('spellResultEmoji').textContent = '🏆';
                document.getElementById('spellResultTitle').textContent = '拼写完美！';
            } else if (accuracy >= 70) {
                document.getElementById('spellResultEmoji').textContent = '👍';
                document.getElementById('spellResultTitle').textContent = '拼写不错！';
            } else {
                document.getElementById('spellResultEmoji').textContent = '✍️';
                document.getElementById('spellResultTitle').textContent = '继续练习拼写！';
            }

            // 拼写完成后弹出打卡完成提示
            showToast('打卡完成！今日学习已记录');
        }

        // ===================== 打卡功能 =====================
        function showCheckin() {
            const records = getCheckins();
            const total = records.length;
            document.getElementById('totalDays').textContent = total;

            let listHtml = '';
            if (records.length === 0) {
                listHtml = '<div style="color:#b2bec3; text-align:center; padding:20px;">暂无打卡记录<br>完成一组学习即可打卡</div>';
            } else {
                const recent = records.slice(-10).reverse();
                recent.forEach(date => {
                    const d = new Date(date);
                    const fmt = `${d.getMonth()+1}月${d.getDate()}日`;
                    listHtml += `<div style="padding:8px 0; border-bottom:1px solid #f0f0f0; display:flex; justify-content:space-between;">
                        <span>✅ 完成学习打卡</span>
                        <span style="color:#8898aa;">${fmt}</span>
                    </div>`;
                });
            }
            document.getElementById('checkinList').innerHTML = listHtml;
            document.getElementById('checkinModal').classList.add('active');
        }

        // 初始化
        updateUnitSelect();
    </script>
</body>
</html>
