                    } catch (e) {
                        // 用户取消分享时走下载兜底
                    }
                }
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'word-checkin.png';
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 3000);
                showToast('已生成打卡图片；iPhone 可在分享菜单中保存到照片，或长按图片保存');
            }, 'image/png');
        }

        // ===================== 手机端拼写体验优化 v12：点击字母/字符串补全 =====================
        let currentSpellTryCount = 0;
        let currentSpellSelected = [];
        let currentSpellChoiceItems = [];
        let currentSpellLocked = false;
        let currentSpellRevealedAfterMaxWrong = false;

        function normalizeSpellToken(text) {
            return (text || '').toLowerCase().replace(/[^a-z]/g, '');
        }

        function shuffleArray(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function buildSpellPuzzle(word) {
            const chars = word.split('');
            const runs = [];
            let i = 0;
            while (i < chars.length) {
                if (/[a-zA-Z]/.test(chars[i])) {
                    let start = i;
                    while (i < chars.length && /[a-zA-Z]/.test(chars[i])) i++;
                    runs.push({ start, end: i - 1, len: i - start });
                } else {
                    i++;
                }
            }

            const segments = [];
            runs.forEach((run, idx) => {
                let count = 1;
                if (run.len >= 8) count = 2;
                if (runs.length >= 2 && run.len >= 5 && idx === 0) count = Math.min(count, 1);
                const candidates = [];
                for (let pos = run.start + (run.len > 3 ? 1 : 0); pos <= run.end; pos++) {
                    for (let size of [2, 1]) {
                        const end = pos + size - 1;
                        if (end > run.end) continue;
                        if (run.len > 4 && pos === run.start && size >= run.len - 1) continue;
                        const text = chars.slice(pos, end + 1).join('');
                        if (!/^[a-zA-Z]+$/.test(text)) continue;
                        candidates.push({ start: pos, end, text, len: size });
                    }
                }
                const chosen = [];
                shuffleArray(candidates).forEach(c => {
                    if (chosen.length >= count) return;
                    if (chosen.some(s => !(c.end < s.start || c.start > s.end))) return;
                    chosen.push(c);
                });
                chosen.sort((a, b) => a.start - b.start);
                segments.push(...chosen);
            });

            if (!segments.length) {
                const letterPositions = chars.map((ch, idx) => /[a-zA-Z]/.test(ch) ? idx : -1).filter(v => v >= 0);
                if (letterPositions.length) {
                    const pos = letterPositions[Math.min(1, letterPositions.length - 1)];
                    segments.push({ start: pos, end: pos, text: chars[pos], len: 1 });
                }
            }

            segments.sort((a, b) => a.start - b.start);
            const displayPieces = [];
            let cursor = 0;
            segments.forEach((seg, segIndex) => {
                if (cursor < seg.start) {
                    const shown = chars.slice(cursor, seg.start).join('');
                    if (shown) displayPieces.push({ type: 'shown', text: shown });
                }
                displayPieces.push({ type: 'blank', text: seg.text, len: seg.text.length, segmentIndex: segIndex });
                cursor = seg.end + 1;
            });
            if (cursor < chars.length) {
                const tail = chars.slice(cursor).join('');
                if (tail) displayPieces.push({ type: 'shown', text: tail });
            }

            const correctTokens = segments.map(s => s.text);
            return { fullWord: word, segments, displayPieces, correctTokens };
        }

        function createChoicePool(correctTokens) {
            const distractorBase = [
                'a','e','i','o','u','y','an','en','in','on','ou','ar','er','ir','or','ur',
                'al','el','le','ly','re','un','im','ic','ti','ci','st','th','sh','ch','ph',
                'ing','ed','es','ion','ism','ment','ous','ful','less'
            ];
            const desired = Math.max(9, Math.min(12, correctTokens.length * 4 + 3));
            const pool = correctTokens.map((t, idx) => ({ id: `c${idx}`, text: t, correct: true }));
            const correctCountMap = {};
            correctTokens.forEach(t => { correctCountMap[t] = (correctCountMap[t] || 0) + 1; });
            let seq = 0;
            const candidates = shuffleArray(distractorBase.concat(correctTokens.map(t => t[0]).filter(Boolean)));
            for (const token of candidates) {
                if (pool.length >= desired) break;
                if (!token) continue;
                const existingSame = pool.filter(item => item.text === token).length;
                const allow = correctCountMap[token] || 0;
                if (existingSame > allow) continue;
                pool.push({ id: `d${seq++}`, text: token, correct: false });
            }
            while (pool.length < desired) {
                const token = distractorBase[pool.length % distractorBase.length];
                pool.push({ id: `dx${seq++}`, text: token, correct: false });
            }
            return shuffleArray(pool);
        }

        function renderSpellWord() {
            const container = document.getElementById('fsSpellWord');
            container.innerHTML = '';
            currentSpellBlank.displayPieces.forEach(piece => {
                if (piece.type === 'shown') {
                    const parts = piece.text.split(/(\s+)/);
                    parts.forEach(part => {
                        if (!part) return;
                        const div = document.createElement('div');
                        if (/^\s+$/.test(part)) {
                            div.className = 'spell-char segment space-segment';
                            div.textContent = '';
                        } else {
                            div.className = 'spell-char segment shown-piece';
                            div.textContent = part;
                        }
                        container.appendChild(div);
                    });
                } else {
                    const div = document.createElement('div');
                    const filled = currentSpellSelected[piece.segmentIndex];
                    div.className = 'spell-char segment blank-segment';
                    if (filled) {
                        div.classList.add('filled-segment');
                        div.textContent = filled.text;
                    } else {
                        div.classList.add('pending');
                        div.textContent = '＿'.repeat(Math.max(1, piece.len));
                    }
                    if (!filled && piece.segmentIndex === currentSpellSelected.length) {
                        div.classList.add('active');
                    }
                    div.dataset.segmentIndex = String(piece.segmentIndex);
                    container.appendChild(div);
                }
            });
        }


        function fitSpellWordOneLine() {
            const container = document.getElementById('fsSpellWord');
            if (!container) return;
            const minSize = 9;
            const maxSize = 23;
            let size = maxSize;
            container.style.setProperty('--spell-font-size', size + 'px');

            // 逐步缩小，确保单词/词组在 iPhone 竖屏内保持一行。
            requestAnimationFrame(() => {
                let guard = 0;
                while (container.scrollWidth > container.clientWidth && size > minSize && guard < 40) {
                    size -= 1;
                    container.style.setProperty('--spell-font-size', size + 'px');
                    guard++;
                }
            });
        }

        function renderSpellChoices() {
            const box = document.getElementById('fsSpellChoices');
            box.innerHTML = '';
            currentSpellChoiceItems.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'spell-choice-btn';
                btn.textContent = item.text;
                btn.dataset.choiceId = item.id;
                if (item.used) btn.classList.add('used');
                btn.disabled = currentSpellLocked || item.used;
                btn.onclick = () => selectSpellChoice(item.id);
                box.appendChild(btn);
            });
        }

        function updateSpellAttemptsText() {
            const left = Math.max(0, 3 - currentSpellTryCount);
            document.getElementById('fsSpellAttempts').textContent = `还可尝试 ${left} 次`;
        }

        function replayCurrentSpellAudio() {
            if (!currentSpellBlank) return;
            speakOnlyWord(currentSpellBlank.fullWord);
        }

        function showSpellQuestion() {
            currentSpellTryCount = 0;
            currentSpellSelected = [];
            currentSpellLocked = false;
            currentSpellRevealedAfterMaxWrong = false;
            document.getElementById('fsSpellCard').classList.remove('reveal-mode');

            const q = spellWords[spellIndex];
            currentSpellWord = q;
            const total = spellWords.length;
            document.getElementById('fsProgressText').textContent = `拼写 ${spellIndex + 1} / ${total}`;
            document.getElementById('fsProgressFill').style.width = `${((spellIndex + 1) / total * 100)}%`;

            const spellWord = sanitizeWord(q.word).word;
            currentSpellBlank = buildSpellPuzzle(spellWord);
            currentSpellChoiceItems = createChoicePool(currentSpellBlank.correctTokens).map(item => ({ ...item, used: false }));

            let hintText = '';
            if (q.meaning) hintText += `<strong>释义：</strong>${q.meaning}`;
            const hintEl = document.getElementById('fsSpellHint');
            hintEl.innerHTML = hintText;
            hintEl.style.display = hintText ? 'block' : 'none';

            const displayPos = q.pos ? q.pos.replace(/\.$/, '') : '';
            const posEl = document.getElementById('fsSpellPos');
            posEl.textContent = displayPos;
            posEl.style.display = displayPos ? 'inline-block' : 'none';

            document.getElementById('fsSpellChoiceHelper').innerHTML = `点击下方字母/字母组合，依次补全 <strong>${currentSpellBlank.correctTokens.length}</strong> 处挖空`;
            updateSpellAttemptsText();
            renderSpellWord();
            renderSpellChoices();
            speakOnlyWord(spellWord);
        }

        function selectSpellChoice(choiceId) {
            if (currentSpellLocked) return;
            const item = currentSpellChoiceItems.find(x => x.id === choiceId);
            if (!item || item.used) return;
            item.used = true;
            currentSpellSelected.push({ id: item.id, text: item.text });
            renderSpellWord();
            renderSpellChoices();
            if (currentSpellSelected.length >= currentSpellBlank.correctTokens.length) {
                validateSpellSelection();
            }
        }

        function clearSpellSelection(manual = false) {
            if (currentSpellLocked && !manual) return;
            if (manual && currentSpellRevealedAfterMaxWrong) {
                clearStudyTimers();
                currentSpellTryCount = 0;
                currentSpellLocked = false;
                currentSpellRevealedAfterMaxWrong = false;
                document.getElementById('fsSpellCard').classList.remove('reveal-mode');
                updateSpellAttemptsText();
            }
            currentSpellSelected = [];
            currentSpellChoiceItems.forEach(item => { item.used = false; });
            renderSpellWord();
            renderSpellChoices();
            if (manual) showToast('已清空本题选择');
        }

        function markWrongAttempt() {
            document.querySelectorAll('#fsSpellWord .blank-segment').forEach(el => {
                el.classList.add('wrong-flash');
            });
            document.querySelectorAll('#fsSpellChoices .spell-choice-btn.used').forEach(el => {
                el.classList.add('wrong-choice');
            });
        }

        function revealSpellWord(isCorrect) {
            currentSpellLocked = true;
            document.getElementById('fsSpellCard').classList.add('reveal-mode');
            const container = document.getElementById('fsSpellWord');
            container.innerHTML = '';
            currentSpellBlank.fullWord.split('').forEach(char => {
                const div = document.createElement('div');
                if (char === ' ') {
                    div.className = 'spell-char segment space-segment';
                    div.textContent = '';
                } else {
                    div.className = 'spell-char segment ' + (isCorrect ? 'correct-reveal' : 'wrong-reveal');
                    div.textContent = char;
                }
                container.appendChild(div);
            });
            document.querySelectorAll('#fsSpellChoices .spell-choice-btn').forEach(btn => {
                btn.disabled = true;
                if (isCorrect) btn.classList.add('correct-choice');
            });
        }

        function validateSpellSelection() {
            currentSpellLocked = true;
            const chosen = currentSpellSelected.map(x => normalizeSpellToken(x.text));
            const correct = currentSpellBlank.correctTokens.map(x => normalizeSpellToken(x));
            const isCorrect = chosen.length === correct.length && chosen.every((x, i) => x === correct[i]);
            if (isCorrect) {
                spellCorrect++;
                playSound('correct');
                revealSpellWord(true);
                speakOnlyWord(currentSpellBlank.fullWord);
                if (spellIndex >= spellWords.length - 1) {
                    studyTimeoutId = setTimeout(() => finishSpellTest(), 950);
                } else {
                    studyTimeoutId = setTimeout(() => nextSpell(), 950);
                }
                return;
            }

            currentSpellTryCount++;
            updateSpellAttemptsText();
            playSound('wrong');
            markWrongAttempt();
            if (currentSpellTryCount >= 3) {
                spellWrong++;
                markCurrentWordHighPriorityWrong(currentSpellWord);
                studyTimeoutId = setTimeout(() => {
                    currentSpellRevealedAfterMaxWrong = true;
                    revealSpellWord(false);
                    showToast(`正确答案：${currentSpellBlank.fullWord}，可点“重选”再练一次，或点“跳过”进入下一题`);
                    speakWordAndExample(currentSpellBlank.fullWord, currentSpellWord.example || '');
                    // 三次错误后停留在本题，允许重选或跳过。
                }, 420);
            } else {
                const left = 3 - currentSpellTryCount;
                studyTimeoutId = setTimeout(() => {
                    currentSpellLocked = false;
                    clearSpellSelection(false);
                    showToast(`不对哦，请重选（还剩 ${left} 次）`);
                }, 480);
            }
        }

        function skipSpell() {
            if (!currentSpellBlank) return;
            clearStudyTimers();

            // 三次错误后已经计过错；此时“跳过”只负责切到下一题或结束学习。
            if (currentSpellRevealedAfterMaxWrong) {
                nextSpell();
                return;
            }

            currentSpellLocked = true;
            spellWrong++;
            markCurrentWordWrong(currentSpellWord);
            playSound('wrong');
            revealSpellWord(false);
            showToast(`已跳过：${currentSpellBlank.fullWord}`);
            speakWordAndExample(currentSpellBlank.fullWord, currentSpellWord.example || '');

            // 最后一题跳过后，直接结束并进入打卡结果页。
            if (spellIndex >= spellWords.length - 1) {
                studyTimeoutId = setTimeout(() => finishSpellTest(), 1400);
            } else {
                studyTimeoutId = setTimeout(() => nextSpell(), 1400);
            }
        }


        function unlockAppAudioOnce() {
            initAudio();
            preloadCustomSounds();
            document.removeEventListener('touchstart', unlockAppAudioOnce);
            document.removeEventListener('click', unlockAppAudioOnce);
        }
        document.addEventListener('touchstart', unlockAppAudioOnce, { once: true, passive: true });
        document.addEventListener('click', unlockAppAudioOnce, { once: true });

        // 初始化
        initBuiltinBankIfNeeded();
        initSpeech();
        restoreLastPrefs();
    </script>
