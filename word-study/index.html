<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#061a3a">
  <title>万词斩</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #061a3a;
      --panel: #ffffff;
      --ink: #061427;
      --muted: #52647d;
      --line: #bdd1ee;
      --soft: #e7f0ff;
      --green: #00b884;
      --green-dark: #005fbe;
      --blue: #0b5fff;
      --blue-dark: #061a3a;
      --coral: #e3344b;
      --yellow: #ffc845;
      --shadow: 0 18px 42px rgba(1, 12, 34, .24);
      --radius: 8px;
      --bottom-nav: 78px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #020b1c;
      color: var(--ink);
    }

    body {
      display: flex;
      justify-content: center;
      font-size: 16px;
      letter-spacing: 0;
      overscroll-behavior: none;
    }

    button,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      background:
        linear-gradient(180deg, #0b3a82 0%, #061a3a 44%, #020b1c 100%);
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: calc(env(safe-area-inset-top) + 12px) 16px 10px;
      background: rgba(6, 26, 58, .94);
      border-bottom: 1px solid rgba(189, 209, 238, .28);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand strong {
      color: #ffffff;
      font-size: 19px;
      line-height: 1.1;
      font-weight: 850;
    }

    .brand span {
      color: #c9dcff;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: #ffffff;
      color: #052050;
      border: 1px solid rgba(255, 255, 255, .72);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.15;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex: 0 0 auto;
    }

    .content {
      min-height: calc(100dvh - var(--bottom-nav));
      padding: 12px 14px calc(var(--bottom-nav) + env(safe-area-inset-bottom) + 18px);
    }

    .screen {
      display: none;
      animation: rise .2s ease-out both;
    }

    .screen.active {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(7px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 12px;
      color: #ffffff;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .section-head p {
      margin: 4px 0 0;
      color: #c9dcff;
      font-size: 13px;
      font-weight: 700;
    }

    .unit-panel,
    .word-row,
    .stat-box {
      border-radius: var(--radius);
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .unit-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .unit-select-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .unit-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      line-height: 1.35;
    }

    .unit-select {
      width: 100%;
      height: 50px;
      padding: 0 38px 0 13px;
      border-radius: var(--radius);
      border: 2px solid #0b5fff;
      color: #061427;
      background: #ffffff;
      outline: none;
      font-size: 17px;
      font-weight: 900;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #0b5fff 50%),
        linear-gradient(135deg, #0b5fff 50%, transparent 50%);
      background-position:
        calc(100% - 21px) 21px,
        calc(100% - 14px) 21px;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
    }

    .unit-select:focus {
      box-shadow: 0 0 0 4px rgba(255, 200, 69, .42);
      border-color: var(--yellow);
    }

    .unit-meta {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 780;
    }

    .mini-meter {
      position: relative;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #d9e6fb;
    }

    .mini-meter i {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--yellow));
    }

    .study-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 2px 0 10px;
    }

    .meter {
      position: relative;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .26);
    }

    .meter span {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--yellow), #31d2ff 48%, var(--green));
      transition: width .22s ease;
    }

    .word-card {
      position: relative;
      min-height: 336px;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid rgba(189, 209, 238, .95);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .word-card.spelling-mode {
      min-height: 0;
      padding: 12px;
    }

    .word-card.meaning-mode {
      min-height: 0;
      padding: 12px;
    }

    .word-card.meaning-mode .word-head {
      align-items: center;
    }

    .word-card.meaning-mode .word-title h1 {
      font-size: clamp(28px, 8vw, 36px);
      line-height: 1.04;
    }

    .word-card.meaning-mode .phonetic {
      margin-top: 4px;
      font-size: 12px;
    }

    .word-card.meaning-mode .icon-button {
      width: 36px;
      height: 36px;
    }

    .word-card.meaning-mode .visual,
    .word-card.meaning-mode .meaning-reveal {
      display: none;
    }

    .word-card.meaning-mode .example-panel {
      min-height: 0;
      margin-top: 8px;
      padding-top: 8px;
    }

    .word-card.meaning-mode .example-panel span {
      font-size: 11px;
    }

    .word-card.meaning-mode .example-panel p {
      font-size: 13px;
      line-height: 1.32;
      font-weight: 740;
    }

    .word-card.spelling-mode .word-head {
      align-items: center;
    }

    .word-card.spelling-mode .word-title h1 {
      font-size: 25px;
      line-height: 1.05;
    }

    .word-card.spelling-mode .phonetic {
      margin-top: 4px;
      font-size: 12px;
    }

    .word-card.spelling-mode .icon-button,
    .word-card.spelling-mode .visual,
    .word-card.spelling-mode .meaning-reveal {
      display: none;
    }

    .word-card.spelling-mode .example-panel {
      min-height: 0;
      margin-top: 8px;
      padding-top: 8px;
    }

    .word-card.spelling-mode .example-panel p {
      font-size: 14px;
      line-height: 1.34;
      font-weight: 760;
    }

    .word-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .word-title {
      min-width: 0;
    }

    .word-title h1 {
      margin: 0;
      font-size: clamp(32px, 10vw, 45px);
      line-height: 1.02;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .phonetic {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--blue);
      border: 1px solid rgba(11, 95, 255, .28);
    }

    .icon-button:active,
    .primary:active,
    .secondary:active,
    .danger-lite:active,
    .choice:active {
      transform: scale(.98);
    }

    .visual {
      height: 118px;
      margin: 12px -2px 10px;
      overflow: hidden;
    }

    .visual svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .example-panel {
      display: grid;
      gap: 7px;
      min-height: 76px;
      padding: 10px 0 0;
      border-top: 1px solid var(--line);
    }

    .example-panel span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .example-panel p {
      margin: 0;
      color: #2f3d3a;
      font-size: 15px;
      line-height: 1.42;
      font-weight: 680;
    }

    .meaning-reveal {
      min-height: 58px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .meaning-reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .meaning-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 850;
    }

    .meaning-main > span:first-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .tag {
      flex: 0 0 auto;
      min-width: 42px;
      padding: 5px 8px;
      border-radius: 999px;
      background: #e7f0ff;
      color: #003e91;
      font-size: 12px;
      font-weight: 850;
      text-align: center;
    }

    .choice-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .choice {
      position: relative;
      display: flex;
      align-items: center;
      gap: 11px;
      width: 100%;
      min-height: 46px;
      padding: 7px 10px;
      border-radius: var(--radius);
      background: #ffffff;
      border: 2px solid #d3e2f7;
      color: #24302e;
      text-align: left;
      box-shadow: 0 6px 16px rgba(27, 42, 38, .05);
    }

    .choice .letter {
      display: grid;
      place-items: center;
      flex: 0 0 28px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--soft);
      color: #003e91;
      font-size: 13px;
      font-weight: 850;
    }

    .choice .text {
      min-width: 0;
      font-size: 14px;
      line-height: 1.3;
      font-weight: 760;
    }

    .choice.correct {
      border-color: #00b884;
      background: #d9fff2;
    }

    .choice.correct .letter {
      background: var(--green);
      color: #ffffff;
    }

    .choice.wrong {
      border-color: #e3344b;
      background: #ffe5e9;
    }

    .choice.wrong .letter {
      background: var(--coral);
      color: #ffffff;
    }

    .choice:disabled {
      opacity: 1;
    }

    .spell-panel {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .cloze-line {
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .16);
      color: #ffffff;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 850;
    }

    .spell-blank {
      display: inline-flex;
      min-width: 92px;
      justify-content: center;
      padding: 0 8px 2px;
      border-bottom: 3px solid var(--yellow);
      color: var(--yellow);
      font-weight: 950;
    }

    .spell-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 900;
    }

    .spell-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 40px;
      padding: 8px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .14);
      border: 1px solid rgba(255, 255, 255, .28);
    }

    .spell-slot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      min-height: 31px;
      padding: 0 10px;
      border-radius: var(--radius);
      background: #ffffff;
      color: #061427;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(1, 12, 34, .16);
    }

    .spell-slot.hint {
      background: #fff4c7;
      color: #061427;
      border: 1px solid rgba(255, 200, 69, .8);
    }

    .spell-slot.empty {
      background: rgba(255, 255, 255, .22);
      color: #d8e7ff;
      border: 1px dashed rgba(255, 255, 255, .44);
      box-shadow: none;
    }

    .spell-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .spell-option {
      min-height: 44px;
      border-radius: var(--radius);
      background: #ffffff;
      color: #061427;
      border: 2px solid #bdd1ee;
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(1, 12, 34, .14);
    }

    .spell-option:disabled {
      color: #697891;
      background: #d9e6fb;
      box-shadow: none;
    }

    .spell-panel.wrong .spell-slots {
      border-color: #ff7a8a;
      background: rgba(227, 52, 75, .22);
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .primary,
    .secondary,
    .danger-lite {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 13px;
      border-radius: var(--radius);
      font-weight: 850;
      white-space: nowrap;
    }

    .primary {
      background: var(--yellow);
      color: #061427;
      box-shadow: 0 10px 22px rgba(255, 200, 69, .28);
    }

    .secondary {
      background: #ffffff;
      color: #003e91;
      border: 2px solid rgba(11, 95, 255, .4);
    }

    .danger-lite {
      background: #ffe5e9;
      color: #9d1025;
      border: 2px solid rgba(227, 52, 75, .44);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 10px 0 14px;
    }

    .stat-box {
      min-height: 76px;
      padding: 12px 10px;
    }

    .stat-box strong {
      display: block;
      font-size: 23px;
      line-height: 1;
      font-weight: 850;
    }

    .stat-box span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 0 -14px 12px;
      padding: 0 14px 2px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--line);
      color: #003e91;
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chip.active {
      color: #061427;
      border-color: var(--yellow);
      background: #fff4c7;
    }

    .search {
      width: 100%;
      height: 46px;
      margin: 0 0 12px;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 2px solid #bdd1ee;
      background: #ffffff;
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 4px rgba(255, 200, 69, .32);
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .word-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 66px;
      padding: 12px;
      color: inherit;
      text-align: left;
    }

    .word-row strong {
      display: block;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 850;
    }

    .word-row span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
    }

    .row-tags {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      min-width: 74px;
      flex-wrap: wrap;
    }

    .tiny-tag {
      padding: 4px 7px;
      border-radius: 999px;
      background: #e7f0ff;
      color: #003e91;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .tiny-tag.killed {
      background: #ffe5e9;
      color: #9d1025;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 180px;
      padding: 22px;
      border: 1px dashed rgba(255, 255, 255, .44);
      border-radius: var(--radius);
      color: #c9dcff;
      text-align: center;
      line-height: 1.45;
      background: rgba(255, 255, 255, .1);
      font-weight: 750;
    }

    .checkin-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: var(--radius);
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: #d9fff2;
      color: #00563f;
      font-size: 14px;
      font-weight: 900;
    }

    .checkin-title {
      margin: 0;
      font-size: 31px;
      line-height: 1.08;
      font-weight: 900;
    }

    .checkin-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
      font-weight: 700;
    }

    .checkin-image {
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #061a3a;
      object-fit: cover;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      width: min(100%, 430px);
      min-height: calc(var(--bottom-nav) + env(safe-area-inset-bottom));
      padding: 9px 10px calc(9px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      background: rgba(3, 16, 40, .96);
      border-top: 1px solid rgba(189, 209, 238, .28);
      backdrop-filter: blur(18px);
    }

    .nav-btn {
      display: grid;
      place-items: center;
      gap: 3px;
      min-height: 52px;
      border-radius: var(--radius);
      color: #c9dcff;
      background: transparent;
      font-size: 11px;
      font-weight: 850;
    }

    .nav-btn.active {
      color: #061427;
      background: var(--yellow);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--bottom-nav) + env(safe-area-inset-bottom) + 12px);
      z-index: 30;
      max-width: min(360px, calc(100% - 36px));
      padding: 11px 14px;
      border-radius: 999px;
      background: rgba(24, 32, 31, .92);
      color: #ffffff;
      font-size: 13px;
      font-weight: 760;
      transform: translate(-50%, 14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 360px) {
      .content {
        padding-left: 10px;
        padding-right: 10px;
      }

      .word-card {
        min-height: 322px;
        padding: 14px;
      }

      .word-card.spelling-mode {
        min-height: 0;
        padding: 10px;
      }

      .word-card.meaning-mode {
        min-height: 0;
        padding: 10px;
      }

      .visual {
        height: 96px;
      }

      .choice .text {
        font-size: 13px;
      }

      .choice {
        min-height: 44px;
        padding: 6px 9px;
      }

      .spell-option {
        min-height: 42px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">

","unit":8,"word":"responsible","phonetic":"/rɪ'spɒnsəbl/","part":"adj.","meaning":"可信任的；可靠的","example":"He is responsible and always keeps his promises.","order":4},{"id":"u8-05-awake","unit":8,"word":"awake","phonetic":"/ə'weɪk/","part":"adj.","meaning":"醒着","example":"I was still awake at ten o'clock.","order":5},{"id":"u8-06-flat","unit":8,"word":"flat","phonetic":"/flæt/","part":"n.","meaning":"公寓","example":"They live in a small flat near the park.","order":6},{"id":"u8-07-choice","unit":8,"word":"choice","phonetic":"/tʃɔɪs/","part":"n.","meaning":"选择","example":"You made the right choice.","order":7},{"id":"u8-08-advise","unit":8,"word":"advise","phonetic":"/əd'vaɪz/","part":"v.","meaning":"劝告；建议","example":"The doctor advised him to rest.","order":8},{"id":"u8-09-cause","unit":8,"word":"cause","phonetic":"/kɔːz/","part":"v.","meaning":"引起；造成；导致","example":"Too much noise can cause stress.","order":9},{"id":"u8-10-complain","unit":8,"word":"complain","phonetic":"/kəm'pleɪn/","part":"v.","meaning":"抱怨；投诉","example":"Don't complain about every small problem.","order":10},{"id":"u8-11-litter","unit":8,"word":"litter","phonetic":"/'lɪtə/","part":"n.","meaning":"垃圾","example":"Please pick up the litter on the ground.","order":11},{"id":"u8-12-unlikely","unit":8,"word":"unlikely","phonetic":"/ʌn'laɪkli/","part":"adj.","meaning":"不大可能发生的","example":"It is unlikely to snow in summer.","order":12},{"id":"u8-13-relieve","unit":8,"word":"relieve","phonetic":"/rɪ'liːv/","part":"v.","meaning":"方便；解手","example":"The dog needs to go outside to relieve itself.","order":13},{"id":"u8-14-indoors","unit":8,"word":"indoors","phonetic":"/ˌɪn'dɔːz/","part":"adv.","meaning":"在室内","example":"We stayed indoors because of the rain.","order":14},{"id":"u8-15-magical","unit":8,"word":"magical","phonetic":"/'mædʒɪkl/","part":"adj.","meaning":"有魔力的","example":"The story is full of magical animals.","order":15},{"id":"u8-16-wealth","unit":8,"word":"wealth","phonetic":"/welθ/","part":"n.","meaning":"钱财；财富","example":"Health is more important than wealth.","order":16},{"id":"u8-17-queen","unit":8,"word":"queen","phonetic":"/kwiːn/","part":"n.","meaning":"女王；王后","example":"The queen lived in a beautiful palace.","order":17},{"id":"u8-18-servant","unit":8,"word":"servant","phonetic":"/'sɜːvənt/","part":"n.","meaning":"仆人；佣人","example":"The servant brought food to the room.","order":18},{"id":"u8-19-pride","unit":8,"word":"pride","phonetic":"/praɪd/","part":"n.","meaning":"自豪；骄傲","example":"His parents felt pride in his success.","order":19},{"id":"u8-20-among","unit":8,"word":"among","phonetic":"/ə'mʌŋ/","part":"prep.","meaning":"在……中","example":"She is popular among her classmates.","order":20},{"id":"u8-21-relationship","unit":8,"word":"relationship","phonetic":"/rɪ'leɪʃnʃɪp/","part":"n.","meaning":"关系","example":"A good relationship needs trust.","order":21},{"id":"u8-22-grow-up","unit":8,"word":"grow up","phonetic":"—","part":"短语","meaning":"长大；成熟","example":"I want to be a teacher when I grow up.","order":22},{"id":"u8-23-care-for","unit":8,"word":"care for","phonetic":"—","part":"短语","meaning":"照顾；照料","example":"We should care for old people.","order":23},{"id":"u8-24-in-short","unit":8,"word":"in short","phonetic":"—","part":"短语","meaning":"总之；简言之","example":"In short, the trip was wonderful.","order":24},{"id":"u8-25-have-no-choice-but-to-do","unit":8,"word":"have no choice but to do","phonetic":"—","part":"短语","meaning":"别无选择；只能……","example":"We had no choice but to wait.","order":25},{"id":"u8-26-run-free","unit":8,"word":"run free","phonetic":"—","part":"短语","meaning":"四处自由走动","example":"Animals should run free in nature.","order":26},{"id":"u8-27-lie-around","unit":8,"word":"lie around","phonetic":"—","part":"短语","meaning":"懒散度日；游手好闲","example":"Don't lie around all day.","order":27},{"id":"u8-28-complain-about","unit":8,"word":"complain about","phonetic":"—","part":"短语","meaning":"抱怨","example":"She often complains about the weather.","order":28},{"id":"u8-29-in-addition","unit":8,"word":"in addition","phonetic":"—","part":"短语","meaning":"除……以外（还）","example":"In addition, we need to bring some water.","order":29},{"id":"u8-30-catch-the-eye-of-somebody","unit":8,"word":"catch the eye of somebody","phonetic":"—","part":"短语","meaning":"引起某人的注意","example":"The bright poster caught the eye of many students.","order":30}]}]</script>
  <script>
    const UNITS = JSON.parse(document.getElementById("vocab-data").textContent);
    const ALL_WORDS = UNITS.flatMap(unit => unit.words);
    const STORE_KEY = "baicika.docx.units.v4";
    const CORPUS_ID = "all-words";
    const TASK_SIZE = 25;
    const DAY = 24 * 60 * 60 * 1000;
    const SCHEDULE_DAYS = [0, 1, 2, 7, 14, 30, 60];

    const q = selector => document.querySelector(selector);
    const els = {
      topSubtitle: q("#topSubtitle"),
      daysPill: q("#daysPill"),
      unitSummary: q("#unitSummary"),
      startUnitBtn: q("#startUnitBtn"),
      unitStats: q("#unitStats"),
      unitProgress: q("#unitProgress"),
      unitPicker: q("#unitPicker"),
      studyPanel: q("#studyPanel"),
      studyModeLabel: q("#studyModeLabel"),
      changeUnitBtn: q("#changeUnitBtn"),
      progressMeter: q("#progressMeter"),
      wordText: q("#wordText"),
      phoneticText: q("#phoneticText"),
      partText: q("#partText"),
      unitTag: q("#unitTag"),
      exampleText: q("#exampleText"),
      meaningText: q("#meaningText"),
      meaningReveal: q("#meaningReveal"),
      visualBox: q("#visualBox"),
      choiceGrid: q("#choiceGrid"),
      speakBtn: q("#speakBtn"),
      replayBtn: q("#replayBtn"),
      killBtn: q("#killBtn"),
      startReviewBtn: q("#startReviewBtn"),
      dueCount: q("#dueCount"),
      weakCount: q("#weakCount"),
      killedCount: q("#killedCount"),
      reviewList: q("#reviewList"),
      searchInput: q("#searchInput"),
      bankHint: q("#bankHint"),
      bankList: q("#bankList"),
      checkinBadge: q("#checkinBadge"),
      checkinTitle: q("#checkinTitle"),
      checkinCopy: q("#checkinCopy"),
      checkinImage: q("#checkinImage"),
      saveImageBtn: q("#saveImageBtn"),
      toast: q("#toast")
    };

    let state = loadState();

    let mode = "learn";
    let queue = [];
    let currentIndex = 0;
    let locked = false;
    let attemptStarted = false;
    let studyStarted = false;
    let stage = "meaning";
    let spellFull = [];
    let spellPrompt = [];
    let spellAnswer = [];
    let spellSelected = [];
    let spellOptions = [];
    let toastTimer = 0;
    let audioCtx = null;
    let voices = [];

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function todayKey(date = new Date()) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function loadState() {
      const fallback = {
        activeUnit: CORPUS_ID,
        words: {},
        sessions: {},
        checkinDays: [],
        totals: { correct: 0, wrong: 0 }
      };
      try {
        const raw = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
        const loaded = raw && typeof raw === "object" ? raw : {};
        return {
          ...fallback,
          ...loaded,
          activeUnit: CORPUS_ID,
          words: loaded.words || {},
          sessions: loaded.sessions || {},
          checkinDays: Array.isArray(loaded.checkinDays) ? loaded.checkinDays : [],
          totals: { ...fallback.totals, ...(loaded.totals || {}) }
        };
      } catch {
        return fallback;
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function unitById(unitId) {
      return UNITS.find(unit => unit.id === unitId) || UNITS[0];
    }

    function wordById(wordId) {
      return ALL_WORDS.find(word => word.id === wordId);
    }

    function wordState(wordId) {
      if (!state.words[wordId]) {
        state.words[wordId] = { seen: 0, correct: 0, wrong: 0, level: 0, due: 0, killed: false };
      }
      return state.words[wordId];
    }

    function sessionKey() {
      return `${todayKey()}|${CORPUS_ID}`;
    }

    function learningCandidates(excludeIds = new Set()) {
      return ALL_WORDS.filter(word => {
        const s = wordState(word.id);
        return !s.killed && (s.correct || 0) === 0 && !excludeIds.has(word.id);
      });
    }

    function reviewWords(excludeIds = new Set()) {
      const now = Date.now();
      return ALL_WORDS
        .filter(word => {
          const s = wordState(word.id);
          return !s.killed && s.seen && !excludeIds.has(word.id);
        })
        .map(word => {
          const s = wordState(word.id);
          const due = s.due || 0;
          const overdueDays = due ? Math.max(0, Math.floor((now - due) / DAY)) : 0;
          const futureDays = due > now ? Math.ceil((due - now) / DAY) : 0;
          const score =
            (due && due <= now ? -10000 : 0) +
            (s.wrong > s.correct ? -2800 : 0) -
            overdueDays * 120 +
            futureDays * 80 +
            s.level * 45 -
            s.wrong * 90 +
            word.unit / 10 +
            word.order / 1000;
          return { word, score };
        })
        .sort((a, b) => a.score - b.score)
        .map(item => item.word);
    }

    function createDailyTask(excludeIds = new Set()) {
      return learningCandidates(excludeIds).slice(0, TASK_SIZE).map(word => word.id);
    }

    function ensureSession() {
      const key = sessionKey();
      const liveIds = new Set(ALL_WORDS.filter(word => !wordState(word.id).killed).map(word => word.id));
      let session = state.sessions[key];
      if (!session || session.day !== todayKey() || session.corpusId !== CORPUS_ID) {
        session = { day: todayKey(), corpusId: CORPUS_ID, taskIds: [], meaningCompleted: [], completed: [], phase: "meaning", finished: false };
      }

      session.taskIds = (session.taskIds || []).filter(id => liveIds.has(id));
      session.completed = (session.completed || []).filter(id => session.taskIds.includes(id));
      session.meaningCompleted = (session.meaningCompleted || session.completed || []).filter(id => session.taskIds.includes(id));

      const remaining = learningCandidates(new Set(session.taskIds));
      const target = Math.min(TASK_SIZE, session.taskIds.length + remaining.length);
      if (session.taskIds.length < target) {
        session.taskIds.push(...createDailyTask(new Set(session.taskIds)).slice(0, target - session.taskIds.length));
      }

      if (!["meaning", "spelling"].includes(session.phase)) session.phase = "meaning";
      if (session.taskIds.length && session.completed.length >= session.taskIds.length) {
        session.finished = true;
        session.phase = "spelling";
      } else if (session.taskIds.length && session.meaningCompleted.length >= session.taskIds.length) {
        session.phase = "spelling";
        session.finished = false;
      } else {
        session.phase = "meaning";
        session.finished = false;
      }

      state.sessions[key] = session;
      return session;
    }

    function beginLearning() {
      ensureAudio();
      if (!learningCandidates().length) {
        showToast("词库已全部学完或斩杀");
        return;
      }
      const previous = state.sessions[sessionKey()];
      if (previous?.finished) delete state.sessions[sessionKey()];
      state.activeUnit = CORPUS_ID;
      mode = "learn";
      studyStarted = true;
      saveState();
      switchTab("learn");
      renderLearn();
      buildLearnQueue();
    }

    function buildLearnQueue() {
      const session = ensureSession();
      saveState();
      if (session.finished) {
        completeTask();
        return;
      }
      const doneIds = session.phase === "meaning" ? session.meaningCompleted : session.completed;
      queue = session.taskIds
        .filter(id => !doneIds.includes(id))
        .map(wordById)
        .filter(Boolean)
        .filter(word => !wordState(word.id).killed);
      currentIndex = 0;

      if (!queue.length) {
        if (session.phase === "meaning") {
          session.phase = "spelling";
          saveState();
          buildLearnQueue();
          return;
        }
        completeTask();
        return;
      }
      renderCard();
    }

    function buildReviewQueue() {
      ensureAudio();
      const now = Date.now();
      queue = ALL_WORDS
        .filter(word => {
          const s = wordState(word.id);
          return !s.killed && s.seen && (s.due <= now || s.wrong > s.correct || s.level < 2);
        })
        .sort((a, b) => {
          const as = wordState(a.id);
          const bs = wordState(b.id);
          return (as.level - bs.level) || (bs.wrong - as.wrong) || (a.unit - b.unit) || (a.order - b.order);
        })
        .slice(0, 24);

      if (!queue.length) {
        showToast("暂时没有需要复习的词");
        renderReview();
        return;
      }

      mode = "review";
      currentIndex = 0;
      state.activeUnit = CORPUS_ID;
      studyStarted = true;
      saveState();
      switchTab("learn");
      renderLearn();
      renderCard();
    }

    function renderLearn() {
      renderTop();
      renderUnitSelector();
      if (!studyStarted) {
        els.unitPicker.classList.remove("hidden");
        els.studyPanel.classList.add("hidden");
      } else {
        els.unitPicker.classList.add("hidden");
        els.studyPanel.classList.remove("hidden");
      }
    }

    function renderTop() {
      els.topSubtitle.textContent = `完整词库 · ${ALL_WORDS.length} 词`;
      els.daysPill.textContent = `累计 ${state.checkinDays.length} 天`;
    }

    function renderUnitSelector() {
      const total = ALL_WORDS.length;
      const killed = ALL_WORDS.filter(word => wordState(word.id).killed).length;
      const learned = ALL_WORDS.filter(word => wordState(word.id).correct > 0 || wordState(word.id).killed).length;
      const target = Math.min(TASK_SIZE, learningCandidates().length);
      const pct = total ? Math.round(learned / total * 100) : 0;
      els.unitSummary.textContent = `完整词库，共 ${ALL_WORDS.length} 词`;
      els.unitStats.innerHTML = `
        <span>已完成 ${learned} / ${total}，已斩杀 ${killed}</span>
        <span>按词库顺序学习接下来的 ${target} 个词</span>
      `;
      els.unitProgress.style.width = `${pct}%`;
      els.startUnitBtn.disabled = target === 0;
      els.startUnitBtn.textContent = target ? `开始 ${target} 词` : "已全部学完";
    }

    function renderCard() {
      const word = queue[currentIndex];
      if (!word) {
        if (mode === "learn") completeTask();
        else {
          showToast("复习完成");
          switchTab("review");
        }
        return;
      }

      locked = false;
      attemptStarted = false;
      stage = "meaning";
      spellFull = [];
      spellPrompt = [];
      spellAnswer = [];
      spellSelected = [];
      spellOptions = [];
      q("#wordCard").classList.remove("spelling-mode");
      q("#wordCard").classList.add("meaning-mode");
      const unit = unitById(`unit-${word.unit}`);
      const session = mode === "learn" ? ensureSession() : null;
      const activePhase = session ? session.phase : "meaning";
      const done = session ? (activePhase === "meaning" ? session.meaningCompleted.length : session.completed.length) : currentIndex;
      const total = session ? session.taskIds.length : queue.length;
      const sourceLabel = "顺序";

      if (mode === "learn" && activePhase === "spelling") {
        renderSpellingTest(word, unit, done, total, sourceLabel);
        return;
      }

      els.studyModeLabel.textContent = mode === "learn" ? `${sourceLabel}学习 · 释义 ${done + 1}/${total}` : `复习 · ${currentIndex + 1}/${queue.length}`;
      els.progressMeter.style.width = `${total ? Math.min(100, done / total * 100) : 0}%`;
      els.wordText.textContent = word.word;
      els.phoneticText.textContent = word.phonetic;
      els.partText.textContent = word.part;
      els.unitTag.textContent = "词库";
      els.exampleText.textContent = word.example;
      els.meaningText.textContent = word.meaning;
      els.meaningReveal.classList.remove("visible");
      els.visualBox.innerHTML = "";
      renderMeaningOptions(word);

      renderTop();
      speakWordThenExample(word);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderMeaningOptions(word) {
      stage = "meaning";
      els.choiceGrid.innerHTML = optionsFor(word).map((option, index) => `
        <button class="choice" type="button" data-id="${esc(option.id)}">
          <span class="letter">${String.fromCharCode(65 + index)}</span>
          <span class="text">${esc(option.meaning)}</span>
        </button>
      `).join("");

      for (const btn of els.choiceGrid.querySelectorAll(".choice")) {
        btn.addEventListener("click", () => chooseOption(btn));
      }
    }

    function optionsFor(word) {
      const sameUnit = unitById(`unit-${word.unit}`).words.filter(item => item.id !== word.id);
      const others = ALL_WORDS.filter(item => item.id !== word.id && item.unit !== word.unit);
      const pool = seededShuffle([...sameUnit, ...others], `${word.id}-pool`);
      const picked = [];
      const seenMeanings = new Set([word.meaning]);
      for (const item of pool) {
        if (picked.length >= 3) break;
        if (seenMeanings.has(item.meaning)) continue;
        picked.push(item);
        seenMeanings.add(item.meaning);
      }
      return seededShuffle([word, ...picked], `${word.id}-${currentIndex}-${mode}`);
    }

    function seededShuffle(items, seedText) {
      let seed = 0;
      for (let i = 0; i < seedText.length; i += 1) seed = (seed * 31 + seedText.charCodeAt(i)) >>> 0;
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        seed = (1664525 * seed + 1013904223) >>> 0;
        const j = seed % (i + 1);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function chooseOption(button) {
      if (locked || stage !== "meaning") return;
      ensureAudio();
      const word = queue[currentIndex];
      const selectedId = button.dataset.id;
      const correct = selectedId === word.id;

      if (!attemptStarted) {
        wordState(word.id).seen += 1;
        attemptStarted = true;
      }

      if (!correct) {
        button.classList.add("wrong");
        button.disabled = true;
        const s = wordState(word.id);
        s.wrong += 1;
        s.level = Math.max(0, s.level - 1);
        s.due = Date.now();
        state.totals.wrong += 1;
        saveState();
        playWrongSound();
        vibrate(35);
        showToast("再试一次");
        renderReview();
        return;
      }

      for (const btn of els.choiceGrid.querySelectorAll(".choice")) {
        btn.disabled = true;
        if (btn.dataset.id === word.id) btn.classList.add("correct");
      }
      els.meaningReveal.classList.add("visible");
      playCorrectSound();
      vibrate(18);
      if (mode === "learn") {
        markMeaningCorrect(word);
        showToast("释义通过");
        setTimeout(nextCard, 520);
      } else {
        showToast("释义通过，开始拼写");
        setTimeout(() => renderSpellingTest(word), 620);
      }
    }

    function markMeaningCorrect(word) {
      if (mode !== "learn") return;
      const session = ensureSession();
      if (!session.meaningCompleted.includes(word.id)) session.meaningCompleted.push(word.id);
      if (session.meaningCompleted.length >= session.taskIds.length) session.phase = "spelling";
      saveState();
      renderReview();
      renderBank();
    }

    function renderSpellingTest(word, unitArg = null, doneArg = currentIndex, totalArg = queue.length, sourceArg = "复习") {
      stage = "spelling";
      locked = false;
      const unit = unitArg || unitById(`unit-${word.unit}`);
      spellFull = spellingChunks(word.word);
      const prompt = spellingPrompt(word, spellFull);
      spellPrompt = prompt.prompt;
      spellAnswer = prompt.answer;
      spellSelected = [];
      spellOptions = spellingOptions(word, spellAnswer);
      q("#wordCard").classList.remove("meaning-mode");
      q("#wordCard").classList.add("spelling-mode");
      els.studyModeLabel.textContent = mode === "learn" ? `顺序学习 · 拼写 ${doneArg + 1}/${totalArg}` : `复习拼写 · ${currentIndex + 1}/${queue.length}`;
      els.progressMeter.style.width = `${totalArg ? Math.min(100, doneArg / totalArg * 100) : 0}%`;
      els.wordText.textContent = "挖空填词";
      els.phoneticText.textContent = `${word.part} · ${word.meaning}`;
      els.partText.textContent = word.part;
      els.unitTag.textContent = "词库";
      els.exampleText.innerHTML = clozeExample(word);
      els.meaningText.textContent = word.meaning;
      els.meaningReveal.classList.add("visible");
      els.visualBox.innerHTML = "";
      els.choiceGrid.innerHTML = spellingMarkup();
      wireSpellingButtons();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function spellingChunks(text) {
      const clean = text.trim().replace(/\s+/g, " ");
      if (clean.includes(" ")) return clean.split(" ");
      if (clean.includes("-")) return clean.split("-").filter(Boolean);
      if (clean.length <= 4) return [...clean];
      const chunks = [];
      let index = 0;
      while (index < clean.length) {
        const left = clean.length - index;
        const size = left <= 4 ? left : left === 5 ? 2 : 3;
        chunks.push(clean.slice(index, index + size));
        index += size;
      }
      return chunks;
    }

    function spellingPrompt(word, chunks) {
      if (chunks.length <= 1) {
        return { prompt: chunks.map(() => null), answer: chunks };
      }
      const hintCount = Math.min(chunks.length - 1, Math.max(1, Math.ceil(chunks.length / 2)));
      const hintIndexes = new Set(
        seededShuffle(chunks.map((_, index) => index), `${word.id}-spell-hints`).slice(0, hintCount)
      );
      const prompt = chunks.map((part, index) => hintIndexes.has(index) ? part : null);
      const answer = chunks.filter((_, index) => !hintIndexes.has(index));
      return { prompt, answer };
    }

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function clozeCandidates(text) {
      const clean = text.trim().replace(/\s+/g, " ");
      const candidates = [clean];
      const lower = clean.toLowerCase();
      for (const lead of ["be ", "a ", "an ", "the "]) {
        if (lower.startsWith(lead)) candidates.push(clean.slice(lead.length));
      }
      if (clean.includes(" ")) candidates.push(clean.split(" ").slice(1).join(" "));
      return [...new Set(candidates.filter(Boolean))];
    }

    function clozeExample(word) {
      const source = word.example || "";
      const blankText = spellPrompt.map(part => part || "____").join(" ");
      const blank = `<span class="spell-blank">${esc(blankText)}</span>`;
      const marker = "[[BAICIKA_BLANK]]";
      for (const candidate of clozeCandidates(word.word)) {
        const escaped = escapeRegExp(candidate).replace(/\s+/g, "\\s+");
        const suffix = /^[A-Za-z]+$/.test(candidate) ? "(?:s|es|d|ed|ing)?" : "";
        const re = new RegExp(`\\b${escaped}${suffix}\\b`, "i");
        if (re.test(source)) return esc(source.replace(re, marker)).replace(marker, blank);
      }
      return `${blank} ${esc(source)}`;
    }

    function spellingOptions(word, answer) {
      const used = new Set(spellFull.map(part => part.toLowerCase()));
      const distractors = [];
      for (const other of seededShuffle(ALL_WORDS.filter(item => item.id !== word.id), `${word.id}-spell`)) {
        for (const part of spellingChunks(other.word)) {
          const normalized = part.toLowerCase();
          if (!/^[a-z]+$/i.test(part) || used.has(normalized) || distractors.includes(part)) continue;
          distractors.push(part);
          if (distractors.length >= Math.min(5, Math.max(3, answer.length))) break;
        }
        if (distractors.length >= Math.min(5, Math.max(3, answer.length))) break;
      }
      return seededShuffle([...answer, ...distractors], `${word.id}-spell-options`);
    }

    function spellingMarkup(isWrong = false) {
      let selectedIndex = 0;
      const slots = spellPrompt.map(part => {
        if (part) return `<span class="spell-slot hint">${esc(part)}</span>`;
        const value = spellSelected[selectedIndex++];
        return `<span class="spell-slot${value ? "" : " empty"}">${esc(value || "___")}</span>`;
      }).join("");
      const usedCounts = {};
      for (const part of spellSelected) usedCounts[part] = (usedCounts[part] || 0) + 1;
      const options = spellOptions.map((part, index) => {
        const used = (usedCounts[part] || 0) > 0;
        if (used) usedCounts[part] -= 1;
        return `<button class="spell-option" type="button" data-spell-index="${index}"${used ? " disabled" : ""}>${esc(part)}</button>`;
      }).join("");
      return `
        <div class="spell-panel${isWrong ? " wrong" : ""}">
          <div class="spell-title">
            <span>已提示约 50%，补全空缺</span>
            <span>${spellSelected.length}/${spellAnswer.length}</span>
          </div>
          <div class="spell-slots">${slots}</div>
          <div class="spell-options">${options}</div>
        </div>
      `;
    }

    function wireSpellingButtons() {
      for (const btn of els.choiceGrid.querySelectorAll(".spell-option")) {
        btn.addEventListener("click", () => chooseSpell(btn));
      }
    }

    function chooseSpell(button) {
      if (locked || stage !== "spelling") return;
      ensureAudio();
      const index = Number(button.dataset.spellIndex);
      const part = spellOptions[index];
      if (!part) return;
      spellSelected.push(part);
      els.choiceGrid.innerHTML = spellingMarkup();
      wireSpellingButtons();

      if (spellSelected.length < spellAnswer.length) return;

      const correct = spellSelected.join("|").toLowerCase() === spellAnswer.join("|").toLowerCase();
      if (!correct) {
        locked = true;
        const word = queue[currentIndex];
        const s = wordState(word.id);
        s.wrong += 1;
        s.level = Math.max(0, s.level - 1);
        s.due = Date.now();
        state.totals.wrong += 1;
        saveState();
        playWrongSound();
        vibrate(35);
        showToast("拼写不对，再试一次");
        els.choiceGrid.innerHTML = spellingMarkup(true);
        setTimeout(() => {
          spellSelected = [];
          locked = false;
          els.choiceGrid.innerHTML = spellingMarkup();
          wireSpellingButtons();
        }, 700);
        return;
      }

      locked = true;
      const word = queue[currentIndex];
      markCorrect(word);
      playCorrectSound();
      vibrate(18);
      showToast("拼写通过");
      setTimeout(nextCard, 850);
    }

    function markCorrect(word) {
      const s = wordState(word.id);
      s.correct += 1;
      s.level = Math.min(6, s.level + 1);
      s.due = Date.now() + SCHEDULE_DAYS[Math.min(SCHEDULE_DAYS.length - 1, s.level)] * DAY;
      state.totals.correct += 1;

      if (mode === "learn") {
        const session = ensureSession();
        if (!session.completed.includes(word.id)) session.completed.push(word.id);
        if (session.completed.length >= session.taskIds.length) session.finished = true;
      }
      saveState();
      renderReview();
      renderBank();
    }

    function nextCard() {
      if (mode === "learn") {
        buildLearnQueue();
        return;
      }

      currentIndex += 1;
      if (currentIndex >= queue.length) {
        showToast("复习完成");
        switchTab("review");
      } else {
        renderCard();
      }
    }

    function killCurrentWord() {
      ensureAudio();
      const word = queue[currentIndex];
      if (!word) return;
      const s = wordState(word.id);
      s.killed = true;
      s.level = 6;
      s.due = Number.MAX_SAFE_INTEGER;
      s.seen += s.seen ? 0 : 1;

      if (mode === "learn") {
        const session = ensureSession();
        if (!session.completed.includes(word.id)) session.completed.push(word.id);
        if (session.completed.length >= session.taskIds.length) session.finished = true;
      }

      saveState();
      playKillSound();
      vibrate(22);
      showToast("已斩杀，不再进入复习");
      renderReview();
      renderBank();
      setTimeout(nextCard, 450);
    }

    function completeTask() {
      const key = sessionKey();
      if (state.sessions[key]) state.sessions[key].finished = true;
      const today = todayKey();
      if (!state.checkinDays.includes(today)) state.checkinDays.push(today);
      saveState();
      renderTop();
      renderCheckin();
      switchTab("checkin");
      playCheckinSound();
      showToast("今日打卡成功");
    }

    function renderReview() {
      const now = Date.now();
      const due = ALL_WORDS.filter(word => {
        const s = wordState(word.id);
        return !s.killed && s.seen && s.due <= now;
      });
      const weak = ALL_WORDS.filter(word => {
        const s = wordState(word.id);
        return !s.killed && s.seen && s.wrong > 0 && s.level < 3;
      });
      const killed = ALL_WORDS.filter(word => wordState(word.id).killed);
      const list = [...new Map([...weak, ...due].map(word => [word.id, word])).values()].slice(0, 14);

      els.dueCount.textContent = due.length;
      els.weakCount.textContent = weak.length;
      els.killedCount.textContent = killed.length;
      els.reviewList.innerHTML = list.length ? list.map(wordRow).join("") : `<div class="empty">当前没有需要复习的词。</div>`;
    }

    function renderBank() {
      const query = els.searchInput.value.trim().toLowerCase();
      const words = ALL_WORDS.filter(word => {
        const text = `${word.word} ${word.meaning} ${word.example} ${word.part}`.toLowerCase();
        return text.includes(query);
      });

      els.bankHint.textContent = `完整词库 · ${ALL_WORDS.length} 词`;
      els.bankList.innerHTML = words.length ? words.map(wordRow).join("") : `<div class="empty">没有找到匹配的单词。</div>`;
    }

    function wordRow(word) {
      const s = wordState(word.id);
      const status = s.killed ? `<span class="tiny-tag killed">已斩杀</span>` : `<span class="tiny-tag">L${s.level}</span>`;
      return `
        <button class="word-row" type="button" data-open-word="${esc(word.id)}">
          <span>
            <strong>${esc(word.word)}</strong>
            <span>${esc(word.part)} ${esc(word.meaning)}</span>
          </span>
          <span class="row-tags">${status}</span>
        </button>
      `;
    }

    function openWord(wordId) {
      const word = wordById(wordId);
      if (!word) return;
      state.activeUnit = CORPUS_ID;
      mode = "review";
      studyStarted = true;
      queue = [word];
      currentIndex = 0;
      saveState();
      switchTab("learn");
      renderLearn();
      renderCard();
    }

    function renderCheckin() {
      const today = todayKey();
      const success = state.checkinDays.includes(today);
      const days = state.checkinDays.length;
      const taskTitle = "顺序学习 25 词";
      els.checkinBadge.textContent = success ? "今日打卡成功" : "今日未打卡";
      els.checkinTitle.textContent = success ? "今天的词已斩下" : "完成任务后点亮打卡";
      els.checkinCopy.textContent = success
        ? `${taskTitle} 已完成。累计打卡 ${days} 天。`
        : `完成一组顺序学习任务后，会自动生成打卡图。`;
      els.saveImageBtn.disabled = !success;
      els.saveImageBtn.style.opacity = success ? "1" : ".48";
      els.checkinImage.src = makeCheckinImage(success, taskTitle, days);
      renderTop();
    }

    function makeCheckinImage(success, unitTitle, days) {
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1440;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#061a3a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      roundRect(ctx, 90, 110, 900, 1220, 28);
      ctx.fill();
      ctx.strokeStyle = "#bdd1ee";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.fillStyle = success ? "#ffc845" : "#52647d";
      roundRect(ctx, 150, 180, success ? 360 : 320, 82, 41);
      ctx.fill();
      ctx.fillStyle = success ? "#061427" : "#ffffff";
      ctx.font = "700 38px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(success ? "今日打卡成功" : "今日未打卡", 190, 233);

      ctx.fillStyle = "#18201f";
      ctx.font = "900 88px -apple-system, BlinkMacSystemFont, sans-serif";
      wrapCanvasText(ctx, success ? "万词斩学习完成" : "万词斩待完成", 150, 380, 780, 104);

      ctx.fillStyle = "#66706d";
      ctx.font = "600 36px -apple-system, BlinkMacSystemFont, sans-serif";
      wrapCanvasText(ctx, `${unitTitle} · 八年级上册文档词库`, 150, 610, 780, 48);

      ctx.fillStyle = "#e7f0ff";
      roundRect(ctx, 150, 750, 780, 260, 24);
      ctx.fill();
      ctx.fillStyle = "#0b5fff";
      ctx.font = "900 124px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(String(days), 190, 910);
      ctx.font = "800 42px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText("累计打卡天数", 190, 970);

      const date = new Date();
      ctx.fillStyle = "#18201f";
      ctx.font = "800 42px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`, 150, 1148);
      ctx.fillStyle = "#66706d";
      ctx.font = "600 30px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText("万词斩 · 离线背词", 150, 1210);

      ctx.strokeStyle = "#00b884";
      ctx.lineWidth = 14;
      ctx.beginPath();
      ctx.moveTo(742, 1110);
      ctx.lineTo(805, 1174);
      ctx.lineTo(930, 1036);
      ctx.stroke();
      return canvas.toDataURL("image/png");
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const chars = [...text];
      let line = "";
      let currentY = y;
      for (const char of chars) {
        const test = line + char;
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, currentY);
          line = char;
          currentY += lineHeight;
        } else {
          line = test;
        }
      }
      if (line) ctx.fillText(line, x, currentY);
    }

    async function saveCheckinImage() {
      const dataUrl = els.checkinImage.src;
      if (!dataUrl || !dataUrl.startsWith("data:image/png")) return;
      try {
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], `baicika-${todayKey()}.png`, { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: "万词斩打卡" });
          showToast("已打开保存菜单");
          return;
        }
      } catch {
        // Fall through to download.
      }
      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = `baicika-${todayKey()}.png`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      showToast("打卡图已生成");
    }

    function refreshVoices() {
      voices = "speechSynthesis" in window ? speechSynthesis.getVoices() : [];
    }

    function preferredVoice() {
      refreshVoices();
      const preferredNames = [
        "Samantha", "Ava", "Allison", "Serena", "Daniel", "Moira",
        "Google US English", "Google UK English Female",
        "Microsoft Aria", "Microsoft Jenny", "Microsoft Sonia"
      ];
      for (const name of preferredNames) {
        const voice = voices.find(v => v.name.toLowerCase().includes(name.toLowerCase()));
        if (voice) return voice;
      }
      return voices.find(v => /^en[-_]/i.test(v.lang) && /natural|premium|enhanced/i.test(v.name))
        || voices.find(v => /^en-US/i.test(v.lang))
        || voices.find(v => /^en[-_]/i.test(v.lang))
        || null;
    }

    function speakWordThenExample(word = queue[currentIndex]) {
      if (!word || !("speechSynthesis" in window)) return;
      refreshVoices();
      speechSynthesis.cancel();
      const voice = preferredVoice();
      const first = new SpeechSynthesisUtterance(word.word);
      first.lang = "en-US";
      first.rate = .82;
      first.pitch = 1.04;
      if (voice) first.voice = voice;
      first.onend = () => {
        setTimeout(() => {
          const current = queue[currentIndex];
          if (!current || current.id !== word.id) return;
          const second = new SpeechSynthesisUtterance(word.example);
          second.lang = "en-US";
          second.rate = .9;
          second.pitch = 1.02;
          if (voice) second.voice = voice;
          speechSynthesis.speak(second);
        }, 1000);
      };
      speechSynthesis.speak(first);
    }

    function ensureAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }

    function tone(freq, start, duration, type = "sine", gainValue = .08) {
      const ctx = ensureAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(gainValue, ctx.currentTime + start + .02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration + .03);
    }

    function playCorrectSound() {
      tone(660, 0, .13, "sine", .07);
      tone(920, .12, .18, "sine", .065);
    }

    function playWrongSound() {
      tone(180, 0, .16, "sawtooth", .045);
      tone(130, .1, .18, "sawtooth", .035);
    }

    function playKillSound() {
      tone(420, 0, .08, "triangle", .06);
      tone(720, .08, .12, "triangle", .07);
    }

    function playCheckinSound() {
      tone(523, 0, .12, "sine", .07);
      tone(659, .13, .12, "sine", .07);
      tone(784, .26, .18, "sine", .075);
      tone(1046, .45, .24, "triangle", .055);
    }

    function vibrate(ms) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function showToast(text) {
      clearTimeout(toastTimer);
      els.toast.textContent = text;
      els.toast.classList.add("show");
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1450);
    }

    function switchTab(tab) {
      document.querySelectorAll(".screen").forEach(screen => screen.classList.remove("active"));
      document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
      q(`#${tab}Screen`).classList.add("active");
      if (tab === "learn") renderLearn();
      if (tab === "review") renderReview();
      if (tab === "bank") renderBank();
      if (tab === "checkin") renderCheckin();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function illustration(word, s) {
      const hue = (word.unit * 41 + word.order * 9) % 360;
      const level = Math.max(0, Math.min(6, s.level || 0));
      const bars = Array.from({ length: 6 }, (_, i) => {
        const h = 26 + i * 11;
        const active = i < level;
        return `<rect x="${78 + i * 42}" y="${154 - h}" width="24" height="${h}" rx="5" fill="${active ? "#11a67a" : "#dfe8e4"}"/>`;
      }).join("");
      const initial = esc(word.word.trim()[0] || "?").toUpperCase();
      return `
        <svg viewBox="0 0 430 150" role="img" aria-label="">
          <rect width="430" height="150" rx="8" fill="#f6fbf8"/>
          <path d="M0 118 C62 88 118 113 179 82 S290 58 430 91 V150 H0Z" fill="hsl(${hue}, 45%, 88%)"/>
          <rect x="42" y="34" width="86" height="86" rx="8" fill="#ffffff" stroke="#dfe8e4" stroke-width="4"/>
          <text x="85" y="96" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="58" font-weight="900" fill="#18201f">${initial}</text>
          ${bars}
          <path d="M318 110 L355 70 L389 110" fill="none" stroke="#2f72d6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="356" cy="69" r="10" fill="#ef684e"/>
        </svg>
      `;
    }

    els.startUnitBtn.addEventListener("click", beginLearning);

    els.changeUnitBtn.addEventListener("click", () => {
      saveState();
      mode = "learn";
      studyStarted = false;
      if ("speechSynthesis" in window) speechSynthesis.cancel();
      renderLearn();
    });

    els.speakBtn.addEventListener("click", () => {
      ensureAudio();
      speakWordThenExample();
    });

    els.replayBtn.addEventListener("click", () => {
      ensureAudio();
      speakWordThenExample();
    });

    els.killBtn.addEventListener("click", killCurrentWord);
    els.startReviewBtn.addEventListener("click", buildReviewQueue);
    els.searchInput.addEventListener("input", renderBank);
    els.saveImageBtn.addEventListener("click", saveCheckinImage);

    document.querySelector(".bottom-nav").addEventListener("click", event => {
      const btn = event.target.closest(".nav-btn");
      if (btn) switchTab(btn.dataset.tab);
    });

    document.body.addEventListener("click", event => {
      const row = event.target.closest("[data-open-word]");
      if (row) openWord(row.dataset.openWord);
    });

    if ("speechSynthesis" in window) {
      refreshVoices();
      speechSynthesis.onvoiceschanged = refreshVoices;
    }

    renderLearn();
    renderReview();
    renderBank();
    renderCheckin();
  </script>
</body>
</html>
