<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fusion 容量查询 · 登录</title>
<style>
:root{--blue:#0067c5;--dark:#003f7d;--ink:#102331;--muted:#667987;--red:#c5161d}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,#0070d8 0,var(--blue) 45%,var(--dark) 100%);padding:20px;color:var(--ink)}.login{width:min(440px,100%);background:#fff;border-radius:18px;padding:30px;box-shadow:0 24px 70px rgba(0,25,58,.36)}.brand{font-size:12px;font-weight:850;letter-spacing:.12em;color:var(--blue);text-transform:uppercase}h1{font-size:30px;letter-spacing:-.03em;margin:9px 0 6px}.sub{color:var(--muted);margin:0 0 24px;font-size:14px}label{display:block;font-size:13px;font-weight:750;margin-bottom:7px}.password-row{display:grid;grid-template-columns:1fr auto;gap:8px}input[type=password],input[type=text]{width:100%;height:48px;border:1px solid #b8c9d5;border-radius:10px;padding:0 13px;font:inherit;outline:none}input:focus{border-color:#0085e6;box-shadow:0 0 0 3px rgba(0,103,197,.16)}button{height:48px;border:0;border-radius:10px;font:inherit;font-weight:800;cursor:pointer}#toggle{width:70px;background:#edf4fa;color:#24506f}#loginButton{width:100%;margin-top:16px;background:var(--blue);color:#fff}#loginButton:disabled{opacity:.65;cursor:wait}.remember{display:flex;align-items:center;gap:8px;margin-top:13px;color:#526675;font-size:13px}.remember input{width:16px;height:16px}#message{min-height:20px;margin:13px 0 0;color:var(--red);font-size:13px;font-weight:700}.security{margin-top:19px;padding-top:15px;border-top:1px solid #dce5eb;color:#73838d;font-size:12px;line-height:1.55}.loader{display:none;margin:10px auto 0;width:22px;height:22px;border:3px solid #cfe2f3;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style></head><body><main class="login"><div class="brand">NetApp Fusion · Encrypted Site</div><h1>Fusion 容量查询</h1><p class="sub">请输入共享密码。应用数据和截图均采用AES-256-GCM加密。</p><form id="form"><label for="password">访问密码</label><div class="password-row"><input id="password" type="password" autocomplete="current-password" autofocus required><button id="toggle" type="button">显示</button></div><label class="remember"><input id="remember" type="checkbox" checked>本标签页保持登录</label><button id="loginButton" type="submit">解锁并进入</button><div class="loader" id="loader"></div><p id="message" role="alert"></p></form><div class="security">密码仅在本浏览器中用于派生解密密钥，不会发送到服务器。连续失败会触发短暂等待。</div></main>
<script>
(()=>{const CONFIG={"version":1,"iterations":310000,"salt":"OuXkr9xNKUu1KzaaJ3HGew==","wrapIv":"l4c6BteBnFieJBD+","wrappedKey":"hgYP1pfVhwd1LZc9sSNjI+NnmIatBjRc6HzOiDu9LtiHFB9ge//xkFRX7BT0u2JU","appPath":"app.fce"};const enc=new TextEncoder(),dec=new TextDecoder();let failures=0;const $=id=>document.getElementById(id);
function fromB64(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
function toB64(a){let s='';for(const b of new Uint8Array(a))s+=String.fromCharCode(b);return btoa(s)}
async function importContentKey(raw){return crypto.subtle.importKey('raw',raw,{name:'AES-GCM'},false,['decrypt'])}
async function derive(password){const material=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:fromB64(CONFIG.salt),iterations:CONFIG.iterations,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['decrypt'])}
async function unwrap(password){const k=await derive(password);return new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(CONFIG.wrapIv),additionalData:enc.encode('FCE-WRAP-v1')},k,fromB64(CONFIG.wrappedKey)))}
async function decryptPath(path,key){const res=await fetch(path,{cache:'force-cache'});if(!res.ok)throw new Error(`资源加载失败 ${res.status}`);const all=new Uint8Array(await res.arrayBuffer());if(all.length<33||dec.decode(all.slice(0,4))!=='FCE1')throw new Error('资源格式无效');return crypto.subtle.decrypt({name:'AES-GCM',iv:all.slice(4,16),additionalData:enc.encode(path)},key,all.slice(16))}
async function enter(rawKey,remember){const key=await importContentKey(rawKey);window.__FUSION_KEY=key;const cache=new Map();window.__assetURL=async path=>{if(cache.has(path))return cache.get(path);const plain=await decryptPath(path,key);const url=URL.createObjectURL(new Blob([plain],{type:'image/webp'}));cache.set(path,url);return url};window.__openEncryptedAsset=async path=>{const tab=window.open('','_blank');try{tab.location=await window.__assetURL(path)}catch(e){if(tab)tab.close();throw e}};window.__logout=()=>{sessionStorage.removeItem('fce-content-key');location.reload()};if(remember)sessionStorage.setItem('fce-content-key',toB64(rawKey));const app=dec.decode(await decryptPath(CONFIG.appPath,key));document.open();document.write(app);document.close()}
async function submit(password,remember){$('loginButton').disabled=true;$('loader').style.display='block';$('message').textContent='';try{const raw=await unwrap(password);await enter(raw,remember)}catch(e){failures++;$('message').textContent='密码错误或加密资源损坏';$('loginButton').disabled=false;$('loader').style.display='none';if(failures>=3){$('loginButton').disabled=true;setTimeout(()=>{$('loginButton').disabled=false;failures=0},5000)}}}
$('toggle').onclick=()=>{const p=$('password'),show=p.type==='password';p.type=show?'text':'password';$('toggle').textContent=show?'隐藏':'显示'};$('form').onsubmit=e=>{e.preventDefault();submit($('password').value,$('remember').checked)};
(async()=>{const saved=sessionStorage.getItem('fce-content-key');if(saved){try{await enter(fromB64(saved),true)}catch(e){sessionStorage.removeItem('fce-content-key')}}})();})();
</script></body></html>
