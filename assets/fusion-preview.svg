<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Fusion 容量查询界面示意图</title>
  <desc id="desc">浅色数据查询面板，展示存储型号、硬盘配置和容量结果。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0672ce"/>
      <stop offset="1" stop-color="#00a7b5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#365b84" flood-opacity=".14"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#78a9d3" stroke-opacity=".11"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <circle cx="715" cy="72" r="118" fill="#0d76cc" opacity=".055"/>
  <circle cx="96" cy="396" r="150" fill="#00a7b5" opacity=".045"/>

  <g filter="url(#shadow)">
    <rect x="65" y="48" width="670" height="354" rx="16" fill="#fff" stroke="#cddff0"/>
  </g>
  <rect x="65" y="48" width="670" height="50" rx="16" fill="#f9fbfe"/>
  <path d="M65 82V64a16 16 0 0 1 16-16h638a16 16 0 0 1 16 16v18" fill="#f9fbfe"/>
  <path d="M65 98H735" stroke="#dbe7f2"/>
  <circle cx="91" cy="73" r="5" fill="#0672ce"/>
  <text x="106" y="78" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#17304c">Fusion Capacity Explorer</text>
  <rect x="623" y="63" width="84" height="21" rx="10.5" fill="#e8f5ef"/>
  <circle cx="640" cy="73.5" r="3.5" fill="#169b73"/>
  <text x="650" y="77" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="9" font-weight="650" fill="#397064">MEASURED</text>

  <text x="94" y="134" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="700" fill="#6a7f98">CONFIGURATION</text>
  <rect x="94" y="147" width="188" height="52" rx="9" fill="#f4f8fc" stroke="#d7e4f0"/>
  <text x="109" y="166" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" fill="#72869d">SYSTEM MODEL</text>
  <text x="109" y="187" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#17304c">AFF A90</text>
  <path d="m258 170 5 5 5-5" fill="none" stroke="#69829c" stroke-width="1.5"/>
  <rect x="294" y="147" width="188" height="52" rx="9" fill="#f4f8fc" stroke="#d7e4f0"/>
  <text x="309" y="166" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" fill="#72869d">DRIVE SET</text>
  <text x="309" y="187" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#17304c">48 × 15.3 TB</text>
  <rect x="494" y="147" width="125" height="52" rx="9" fill="#0672ce"/>
  <text x="556.5" y="179" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#fff">精确查询</text>

  <rect x="94" y="225" width="292" height="139" rx="12" fill="#f6f9fd" stroke="#d7e4f0"/>
  <text x="116" y="253" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="700" fill="#637a93">CAPACITY RESULT</text>
  <text x="116" y="298" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="31" font-weight="750" fill="#132f4d">734.4</text>
  <text x="220" y="297" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#58728f">TB RAW</text>
  <text x="116" y="337" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700" fill="#0672ce">612.8 TB</text>
  <text x="225" y="336" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#58728f">USABLE</text>

  <g transform="translate(416 227)">
    <text x="0" y="24" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="700" fill="#637a93">USABLE CAPACITY</text>
    <rect x="0" y="44" width="250" height="14" rx="7" fill="#e6eef7"/>
    <rect x="0" y="44" width="207" height="14" rx="7" fill="url(#bar)"/>
    <line x1="0" y1="86" x2="250" y2="86" stroke="#d7e4f0"/>
    <g fill="#6b8198" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9">
      <text x="0" y="106">0</text><text x="112" y="106">400 TB</text><text x="218" y="106">800 TB</text>
    </g>
    <g transform="translate(0 124)">
      <rect width="25" height="12" rx="3" fill="#86b9e5" opacity=".75"/>
      <rect x="31" width="25" height="12" rx="3" fill="#5aa2df" opacity=".8"/>
      <rect x="62" width="25" height="12" rx="3" fill="#2888d5" opacity=".85"/>
      <rect x="93" width="25" height="12" rx="3" fill="#0672ce"/>
      <rect x="124" width="25" height="12" rx="3" fill="#0a8cbf"/>
      <rect x="155" width="25" height="12" rx="3" fill="#00a7b5"/>
    </g>
  </g>
</svg>
